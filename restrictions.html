<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حظر السائقين - نظام إدارة طلبات البحص</title>
    <style>
        /* جميع الأنماط كما هي - لم تتغير */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; position: relative; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #eb3349, #f45c43); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.85em; }
        .card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
        .form-group label { font-size: 0.85em; color: #a8b2d1; }
        .form-group select, .form-group input, .form-group textarea { padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; }
        select { background-color: #2a2a4e !important; color: #ffffff !important; }
        select option { background-color: #1a1a2e !important; color: #ffffff !important; }
        select optgroup { background-color: #1a1a2e !important; color: #ffffff !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(102,126,234,0.3); }
        .badge-active { background: #38ef7d; color: #1a1a2e; padding: 4px 10px; border-radius: 20px; font-size: 0.8em; }
        .badge-inactive { background: #f5576c; color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.8em; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; }
        .toast { padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; font-weight: 600; }
        .toast-success { background: #11998e; }
        .toast-error { background: #eb3349; }
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display: none; align-items:center; justify-content:center; z-index:2000; }
        .loading.active { display: flex; }
        .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header"><h1>⛔ حظر السائقين من المصانع</h1><p>منع سائق معين من الذهاب إلى مصنع محدد (بسبب شكوى أو مخالفة)</p></div>
        <div class="nav-links" id="navLinks"></div>
        <div class="card"><h3>➕ إضافة حظر جديد</h3>
            <div class="form-row">
                <div class="form-group"><label>🚛 رقم السيارة / السائق</label><select id="truckSelect"></select></div>
                <div class="form-group"><label>🏭 المصنع المحظور</label><select id="factorySelect"></select></div>
                <div class="form-group"><label>📝 سبب الحظر</label><input type="text" id="reason" placeholder="مثال: شكوى من المصنع"></div>
                <div class="form-group"><button class="btn btn-success" onclick="addRestriction()">➕ إضافة حظر</button></div>
            </div>
        </div>
        <div class="card"><h3>📋 قائمة الحظر الحالية</h3><div id="restrictionsMessage" style="color: #f5576c; text-align: center; padding: 10px;"></div>
            <table id="restrictionsTable"><thead><tr><th>رقم السيارة</th><th>السائق</th><th>المصنع المحظور</th><th>السبب</th><th>الحالة</th><th>تاريخ الإضافة</th><th>إجراء</th></tr></thead><tbody id="restrictionsBody"><tr><td colspan="7">جاري التحميل...</td></tr></tbody></table>
        </div>
    </div>
    <script>
        const API_BASE = '/api';
        let trucks = [], factories = [], restrictions = [];

        async function apiCall(endpoint, method='GET', data=null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
            if (data && (method === 'POST' || method === 'PUT')) opts.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, opts);
            if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        setInterval(async () => { try { await fetch('/api/me', { credentials: 'include' }); } catch(e) {} }, 5 * 60 * 1000);

        async function loadData() {
            showLoading(true);
            const msgDiv = document.getElementById('restrictionsMessage');
            msgDiv.innerHTML = '';
            try {
                const settings = await apiCall('/settings');
                // معالجة المصانع: قد تأتي كأسماء أو ككائنات
                factories = (settings.factories || []).map(f => typeof f === 'object' ? (f.name || f.factory_name || f.text || '') : f);
                trucks = (settings.trucks || []).map(t => {
                    if (typeof t === 'object') return { number: t.number, driver: t.driver };
                    return { number: t, driver: t };
                });
                console.log('تم جلب السيارات:', trucks.length, 'المصانع:', factories);
                
                restrictions = await apiCall('/restrictions');
                console.log('تم جلب الحظر:', restrictions.length);
                
                renderTruckSelect();
                renderFactorySelect();
                renderRestrictionsTable();
                if (restrictions.length === 0) msgDiv.innerHTML = '⚠️ لا توجد قيود حالياً. يمكنك إضافة حظر جديد من الأعلى.';
            } catch (e) {
                console.error(e);
                msgDiv.innerHTML = '❌ خطأ في تحميل البيانات: ' + e.message;
                showToast('خطأ في تحميل البيانات', 'error');
            }
            showLoading(false);
        }

        function renderTruckSelect() {
            const sel = document.getElementById('truckSelect');
            if (!sel) return;
            if (!trucks.length) { sel.innerHTML = '<option value="">لا توجد سيارات</option>'; return; }
            sel.innerHTML = '<option value="">-- اختر السيارة --</option>' + trucks.map(t => `<option value="${t.number}">${t.number} - ${t.driver}</option>`).join('');
        }
        
        function renderFactorySelect() {
            const sel = document.getElementById('factorySelect');
            if (!sel) return;
            const validFactories = factories.filter(f => f && f.trim());
            if (!validFactories.length) { sel.innerHTML = '<option value="">لا توجد مصانع</option>'; return; }
            sel.innerHTML = '<option value="">-- اختر المصنع --</option>' + validFactories.map(f => `<option value="${f}">${f}</option>`).join('');
        }

        async function addRestriction() {
            const truckNumber = document.getElementById('truckSelect').value;
            const factory = document.getElementById('factorySelect').value;
            const reason = document.getElementById('reason').value.trim();
            if (!truckNumber || !factory) { showToast('اختر السيارة والمصنع', 'error'); return; }
            const truck = trucks.find(t => t.number === truckNumber);
            if (!truck) { showToast('السيارة غير موجودة', 'error'); return; }
            const newRestriction = {
                truckNumber: truck.number,
                driverName: truck.driver,
                restrictedFactories: [factory],
                reason: reason || 'لا يوجد سبب',
                active: true
            };
            showLoading(true);
            try {
                await apiCall('/restrictions', 'POST', newRestriction);
                showToast('✅ تم إضافة الحظر', 'success');
                restrictions = await apiCall('/restrictions');
                renderRestrictionsTable();
                document.getElementById('reason').value = '';
                document.getElementById('restrictionsMessage').innerHTML = '';
            } catch (e) { showToast('خطأ: ' + e.message, 'error'); }
            showLoading(false);
        }

        async function toggleRestriction(id, currentActive) {
            showLoading(true);
            try {
                await apiCall(`/restrictions/${id}`, 'PUT', { active: !currentActive });
                restrictions = await apiCall('/restrictions');
                renderRestrictionsTable();
                showToast(!currentActive ? '✅ تم تفعيل الحظر' : '✅ تم فك الحظر', 'success');
            } catch (e) { showToast('خطأ: ' + e.message, 'error'); }
            showLoading(false);
        }

        async function deleteRestriction(id) {
            if (!confirm('هل أنت متأكد من حذف هذا الحظر نهائياً؟')) return;
            showLoading(true);
            try {
                await apiCall(`/restrictions/${id}`, 'DELETE');
                restrictions = await apiCall('/restrictions');
                renderRestrictionsTable();
                showToast('تم الحذف', 'success');
                if (restrictions.length === 0) document.getElementById('restrictionsMessage').innerHTML = '⚠️ لا توجد قيود حالياً.';
            } catch (e) { showToast('خطأ: ' + e.message, 'error'); }
            showLoading(false);
        }

        function renderRestrictionsTable() {
            const tbody = document.getElementById('restrictionsBody');
            if (!tbody) return;
            if (!restrictions.length) { tbody.innerHTML = '<tr><td colspan="7">لا توجد قيود</td></tr>'; return; }
            tbody.innerHTML = restrictions.map(r => `
                <tr>
                    <td>${escapeHtml(r.truckNumber)}</td>
                    <td>${escapeHtml(r.driverName)}</td>
                    <td>${escapeHtml(r.restrictedFactories.join(', '))}</td>
                    <td>${escapeHtml(r.reason || '-')}</td>
                    <td><span class="${r.active ? 'badge-active' : 'badge-inactive'}">${r.active ? 'محظور' : 'مفكوك'}</span></td>
                    <td>${new Date(r.createdAt).toLocaleDateString('ar-SA')}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="toggleRestriction(${r.id}, ${r.active})">${r.active ? '🔓 فك الحظر' : '🔒 تطبيق الحظر'}</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteRestriction(${r.id})">🗑️ حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        function showToast(msg, type) { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast toast-${type}`; t.innerText = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function showLoading(show) { document.getElementById('loading').classList.toggle('active', show); }
        function loadNav() { fetch('/api/me', { credentials: 'include' }).then(r => r.json()).then(data => { if (data.user) document.getElementById('navLinks').innerHTML = `<a href="index.html" class="nav-link">📊 الرئيسية</a><a href="orders.html" class="nav-link">📝 الطلبات</a><a href="distribution.html" class="nav-link">🚚 التوزيع</a><a href="trucks.html" class="nav-link">🚛 السيارات</a><a href="products.html" class="nav-link">📦 أنواع البحص</a><a href="factories.html" class="nav-link">🏭 المصانع</a><a href="reports.html" class="nav-link">📊 التقارير</a><a href="settings.html" class="nav-link">⚙️ الإعدادات</a><a href="restrictions.html" class="nav-link active">⛔ الحظر</a><a href="users.html" class="nav-link">👥 المستخدمين</a><a href="logs.html" class="nav-link">📜 السجلات</a>`; else window.location.href = '/login.html'; }).catch(() => window.location.href = '/login.html'); }
        document.addEventListener('DOMContentLoaded', () => { loadNav(); loadData(); });
    </script>
    <script src="navbar.js"></script>
</body>
</html>
