<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - نظام إدارة طلبات البحص</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; position: relative; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2)); border-radius: 15px; padding: 25px; text-align: center; backdrop-filter: blur(10px); }
        .stat-card h3 { font-size: 2.5em; color: #38ef7d; margin-bottom: 10px; }
        .stat-card p { color: #a8b2d1; font-size: 1em; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .chart-container { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; }
        .chart-container h3 { margin-bottom: 15px; color: #667eea; text-align: center; }
        .chart-wrapper { height: 300px; width: 100%; }
        .recent-orders { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-top: 20px; overflow-x: auto; }
        .recent-orders h3 { margin-bottom: 15px; color: #667eea; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(102,126,234,0.3); font-weight: 600; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 600; display: inline-block; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; }
        .toast { padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; font-weight: 600; animation: slideIn 0.3s ease; }
        .toast-success { background: #11998e; }
        .toast-error { background: #eb3349; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display: flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width:768px){ .charts-grid { grid-template-columns:1fr; } .chart-wrapper { height:250px; } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header">
            <h1>📊 لوحة التحكم الرئيسية</h1>
            <p>نظام إدارة طلبات وتوزيع البحص</p>
            <div id="logout-btn-container" style="position: absolute; top: 20px; left: 20px;"><button onclick="logout()" style="background: linear-gradient(135deg, #f5576c, #eb3349); border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;">🚪 تسجيل الخروج</button></div>
        </div>
        <div class="nav-links" id="navLinks"></div>

        <div class="stats-grid">
            <div class="stat-card"><h3 id="totalOrders">0</h3><p>📋 إجمالي الطلبات اليوم</p></div>
            <div class="stat-card"><h3 id="totalTrips">0</h3><p>🚚 الرحلات الموزعة</p></div>
            <div class="stat-card"><h3 id="activeTrucks">0</h3><p>🚛 سيارات نشطة</p></div>
            <div class="stat-card"><h3 id="completedPercentage">0%</h3><p>📈 نسبة الإنجاز</p></div>
        </div>

        <div class="charts-grid">
            <div class="chart-container"><h3>📈 توزيع الطلبات حسب المصنع</h3><div class="chart-wrapper"><canvas id="factoriesChart"></canvas></div></div>
            <div class="chart-container"><h3>📦 توزيع الطلبات حسب نوع البحص</h3><div class="chart-wrapper"><canvas id="materialsChart"></canvas></div></div>
        </div>

        <div class="recent-orders">
            <h3>📋 آخر 10 طلبات اليوم</h3>
            <table>
                <thead><tr><th>#</th><th>المصنع</th><th>نوع البحص</th><th>التوقيت</th><th>وقت الإضافة</th></tr></thead>
                <tbody id="recentOrdersTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let factoriesChart, materialsChart;
        let currentDate = new Date().toISOString().split('T')[0];

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
            if (data) options.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        // دالة تنظيف أي قيمة undefined أو null أو نص "undefined"
        function cleanValue(value, defaultValue = '—') {
            if (value === undefined || value === null || value === 'undefined' || value === 'null' || (typeof value === 'string' && value.trim() === '')) {
                return defaultValue;
            }
            return value;
        }

        function formatTime(time) {
            return cleanValue(time, '—');
        }

        async function loadDashboard() {
            showLoading(true);
            try {
                const [settings, dayData] = await Promise.all([
                    apiCall('/settings'),
                    apiCall(`/day/${currentDate}`)
                ]);
                
                const orders = dayData.orders || [];
                const distribution = dayData.distribution || [];
                const trucks = settings.trucks || [];
                
                // إحصائيات سريعة
                document.getElementById('totalOrders').textContent = orders.length;
                document.getElementById('totalTrips').textContent = distribution.length;
                const activeTrucks = new Set(distribution.map(d => d.truck?.number).filter(Boolean)).size;
                document.getElementById('activeTrucks').textContent = activeTrucks;
                const target = trucks.length * 2;
                const percentage = target > 0 ? Math.min(100, Math.round((distribution.length / target) * 100)) : 0;
                document.getElementById('completedPercentage').textContent = percentage + '%';
                
                // إحصائيات المصانع
                const factoryStats = {};
                orders.forEach(order => {
                    const factory = cleanValue(order.factory, 'غير محدد');
                    factoryStats[factory] = (factoryStats[factory] || 0) + 1;
                });
                
                // إحصائيات المواد
                const materialStats = {};
                orders.forEach(order => {
                    const material = cleanValue(order.material, 'غير محدد');
                    materialStats[material] = (materialStats[material] || 0) + 1;
                });
                
                // رسم الرسوم البيانية
                renderFactoriesChart(factoryStats);
                renderMaterialsChart(materialStats);
                
                // عرض آخر 10 طلبات (مع تنظيف البيانات)
                const recent = orders.slice(-10).reverse().map(order => ({
                    factory: cleanValue(order.factory, 'غير محدد'),
                    material: cleanValue(order.material, 'غير محدد'),
                    time: formatTime(order.time),
                    timestamp: cleanValue(order.timestamp, 'غير محدد')
                }));
                renderRecentOrders(recent);
                
            } catch (error) {
                console.error(error);
                showToast('خطأ في تحميل البيانات', 'error');
            }
            showLoading(false);
        }
        
        function renderFactoriesChart(stats) {
            const ctx = document.getElementById('factoriesChart').getContext('2d');
            if (factoriesChart) factoriesChart.destroy();
            const labels = Object.keys(stats).slice(0, 8);
            const data = labels.map(l => stats[l]);
            factoriesChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'عدد الطلبات', data, backgroundColor: 'rgba(102,126,234,0.8)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } }, scales: { x: { ticks: { color: '#a8b2d1' } }, y: { ticks: { color: '#a8b2d1' }, beginAtZero: true } } }
            });
        }
        
        function renderMaterialsChart(stats) {
            const ctx = document.getElementById('materialsChart').getContext('2d');
            if (materialsChart) materialsChart.destroy();
            const labels = Object.keys(stats);
            const data = Object.values(stats);
            const colors = ['#667eea', '#f5576c', '#38ef7d', '#4facfe', '#f093fb'];
            materialsChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data, backgroundColor: colors }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }
        
        function renderRecentOrders(orders) {
            const tbody = document.getElementById('recentOrdersTable');
            if (!orders.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد طلبات اليوم</td></tr>';
                return;
            }
            tbody.innerHTML = orders.map((order, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${order.factory}</td>
                    <td>${order.material}</td>
                    <td>${order.time}</td>
                    <td>${order.timestamp}</td>
                </tr>
            `).join('');
        }
        
        function showToast(msg, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }
        
        function logout() {
            if (confirm('تسجيل الخروج؟')) {
                fetch('/api/logout', { method: 'POST', credentials: 'include' })
                    .then(() => window.location.href = '/login.html');
            }
        }
        
        function loadNav() {
            fetch('/api/me', { credentials: 'include' })
                .then(r => r.json())
                .then(data => {
                    if (data.user) {
                        document.getElementById('navLinks').innerHTML = `
                            <a href="index.html" class="nav-link active">📊 الرئيسية</a>
                            <a href="orders.html" class="nav-link">📝 الطلبات</a>
                            <a href="distribution.html" class="nav-link">🚚 التوزيع</a>
                            <a href="trucks.html" class="nav-link">🚛 السيارات</a>
                            <a href="products.html" class="nav-link">📦 أنواع البحص</a>
                            <a href="factories.html" class="nav-link">🏭 المصانع</a>
                            <a href="reports.html" class="nav-link">📊 التقارير</a>
                            <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
                            <a href="restrictions.html" class="nav-link">⛔ الحظر</a>
                            <a href="users.html" class="nav-link">👥 المستخدمين</a>
                            <a href="logs.html" class="nav-link">📜 السجلات</a>
                        `;
                    } else {
                        window.location.href = '/login.html';
                    }
                })
                .catch(() => { window.location.href = '/login.html'; });
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            loadNav();
            showLoading(true);
            await loadDashboard();
            showLoading(false);
        });
    </script>
</body>
    <!-- لوحة الإشعارات -->
<div style="background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;margin-top:25px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
        <h3 style="color:#667eea">🔔 الإشعارات <span id="notifCount" style="background:#f5576c;border-radius:20px;padding:2px 8px;font-size:0.7em">0</span></h3>
        <div>
            <button id="soundBtn" onclick="toggleSound()" style="background:#4facfe;border:none;padding:5px 12px;border-radius:8px;color:#fff;cursor:pointer;margin-left:10px">🔊 الصوت مفعل</button>
            <button onclick="markAllRead()" style="background:#f093fb;border:none;padding:5px 12px;border-radius:8px;color:#fff;cursor:pointer">✅ تحديد الكل كمقروء</button>
        </div>
    </div>
    <div id="notificationsList" style="max-height:300px;overflow-y:auto"></div>
</div>

<script>
    function renderNotifications() {
        const container = document.getElementById('notificationsList');
        const countSpan = document.getElementById('notifCount');
        const unread = notifications.getUnread();
        if (countSpan) countSpan.textContent = unread.length;
        if (!notifications.items.length) {
            container.innerHTML = '<p style="text-align:center;color:#a8b2d1;padding:20px">لا توجد إشعارات</p>';
            return;
        }
        container.innerHTML = notifications.items.map(n => `
            <div style="background:${n.read ? 'rgba(255,255,255,0.03)' : 'rgba(102,126,234,0.2)'};border-right:3px solid ${n.read ? '#4facfe' : '#38ef7d'};padding:12px;margin-bottom:8px;border-radius:8px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <div style="font-weight:bold">📋 ${n.factory} - ${n.material} ${n.count > 1 ? `(${n.count} طلبات)` : ''}</div>
                    <div style="font-size:0.75em;color:#a8b2d1">🕐 ${n.timestamp}</div>
                </div>
                <div>
                    ${!n.read ? `<button onclick="notifications.markAsRead(${n.id});renderNotifications()" style="background:#4facfe;border:none;padding:5px 10px;border-radius:6px;color:#fff;cursor:pointer;margin-left:5px">قرأت</button>` : ''}
                    <button onclick="notifications.delete(${n.id});renderNotifications()" style="background:#eb3349;border:none;padding:5px 10px;border-radius:6px;color:#fff;cursor:pointer">حذف</button>
                </div>
            </div>
        `).join('');
    }
    
    function toggleSound() {
        const enabled = notifications.toggleSound();
        document.getElementById('soundBtn').innerHTML = enabled ? '🔊 الصوت مفعل' : '🔇 الصوت معطل';
    }
    
    function markAllRead() {
        notifications.markAllAsRead();
        renderNotifications();
    }
    
    window.renderNotifications = renderNotifications;
    const soundEnabled = localStorage.getItem('soundEnabled');
    if (soundEnabled !== null) notifications.audioEnabled = soundEnabled === 'true';
    document.getElementById('soundBtn').innerHTML = notifications.audioEnabled ? '🔊 الصوت مفعل' : '🔇 الصوت معطل';
    renderNotifications();
</script>
</html>
