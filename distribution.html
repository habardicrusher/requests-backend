<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التوزيع - نظام إدارة طلبات البحص</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; position: relative; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .date-section {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .date-section input[type="date"] { padding: 12px 20px; border-radius: 10px; border: none; background: #fff; color: #333; cursor: pointer; }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: #fff; }
        .btn-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; }
        .print-btn { background: linear-gradient(135deg, #757f9a 0%, #d7dde8 100%); color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(102,126,234,0.3); font-weight: 600; }
        .road-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.85em; font-weight: 600; display: inline-block; }
        .road-1 { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .road-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .road-3 { background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%); }
        .time-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8em; background: rgba(79,172,254,0.3); color: #4facfe; display: inline-block; }
        .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .stat-card { flex:1; min-width:150px; padding:15px; background:rgba(255,255,255,0.05); border-radius:12px; text-align:center; }
        .stat-card .number { font-size:1.8em; font-weight:bold; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 10px; color: #fff; font-weight: 600; animation: slideIn 0.3s ease; }
        .toast-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .toast-error { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .toast-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display: flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width:768px){ th,td { font-size:0.75em; padding:8px; } }
        @media print { .nav-links, .date-section .btn, .btn-danger, .btn-info, .print-btn, .toast-container, .loading { display: none; } .road-badge { -webkit-print-color-adjust: exact; } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header"><h1>🚚 التوزيع التلقائي</h1><p>توزيع الطلبات على السيارات مع تجنب تكرار السائق لنفس المصنع</p>
            <div id="logout-btn-container" style="position: absolute; top: 20px; left: 20px;"><button onclick="logout()" style="background: linear-gradient(135deg, #f5576c, #eb3349); border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;">🚪 تسجيل الخروج</button></div>
        </div>
        <div class="nav-links" id="navLinks"></div>
        <div class="date-section">
            <div><label>📅 تاريخ العمل: </label><input type="date" id="orderDate" onchange="loadData()"></div>
            <div><button class="btn btn-success" onclick="autoDistribute()">⚡ توزيع تلقائي (ذكي)</button><button class="btn btn-danger" onclick="resetDistribution()">🔄 إعادة التعيين</button><button class="btn print-btn" onclick="window.print()">🖨️ طباعة</button></div>
        </div>
        <div class="stats" id="statsSection" style="display: none;">
            <div class="stat-card"><h4>📋 عدد الطلبات</h4><div class="number" id="statOrders">0</div></div>
            <div class="stat-card"><h4>🚛 عدد السيارات</h4><div class="number" id="statTrucks">0</div></div>
            <div class="stat-card"><h4>✅ تم التوزيع</h4><div class="number" id="statDistributed">0</div></div>
            <div class="stat-card"><h4>🔄 آخر رود</h4><div class="number" id="statRoad">-</div></div>
        </div>
        <h2>📋 قائمة التوزيع</h2>
        <div style="overflow-x: auto;">
            <table><thead><tr><th>#</th><th>رقم السيارة</th><th>السائق</th><th>المصنع</th><th>نوع البحص</th><th>التوقيت</th><th>الرود</th></tr></thead><tbody id="distributionTable"><tr><td colspan="7" style="text-align:center; padding:30px;">لا يوجد توزيع بعد</td></tr></tbody>
        </table>
        </div>
    </div>
    <script>
        const API_BASE = '/api';
        let trucks = [], orders = [], distribution = [], currentDate = '';

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
            if (data) options.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        setInterval(async () => { try { await fetch('/api/me', { credentials: 'include' }); } catch(e) {} }, 4 * 60 * 1000);

        async function loadSettings() {
            try {
                const data = await apiCall('/settings');
                trucks = data.trucks || [];
                document.getElementById('statTrucks').textContent = trucks.length;
            } catch(e) { showToast('خطأ في تحميل السيارات', 'error'); }
        }

        async function loadData() {
            currentDate = document.getElementById('orderDate').value;
            try {
                const data = await apiCall(`/day/${currentDate}`);
                orders = data.orders || [];
                distribution = data.distribution || [];
                renderDistribution();
                updateStats();
            } catch(e) {
                console.error('خطأ في تحميل بيانات اليوم:', e);
                showToast('فشل تحميل بيانات التوزيع. حاول مرة أخرى', 'error');
                // إظهار جدول فارغ
                orders = [];
                distribution = [];
                renderDistribution();
                updateStats();
            }
        }

        async function saveData() {
            try {
                await apiCall(`/day/${currentDate}`, 'PUT', { orders, distribution });
                return true;
            } catch(e) { showToast('خطأ في الحفظ', 'error'); return false; }
        }

        function updateStats() {
            const s = document.getElementById('statsSection');
            if (orders.length || distribution.length) {
                s.style.display = 'flex';
                document.getElementById('statOrders').textContent = orders.length;
                document.getElementById('statDistributed').textContent = distribution.length;
                const maxRoad = distribution.length ? Math.max(...distribution.map(d => d.road)) : 1;
                document.getElementById('statRoad').textContent = `رود ${maxRoad}`;
            } else {
                s.style.display = 'none';
            }
        }

        async function autoDistribute() {
            if (!orders.length) { showToast('لا توجد طلبات', 'error'); return; }
            if (!trucks.length) { showToast('لا توجد سيارات', 'error'); return; }
            showLoading(true);
            distribution = [];
            let lastFactoryForTruck = {}; trucks.forEach(t => { lastFactoryForTruck[t.number] = null; });
            let availableTrucks = [...trucks];
            for (let i = 0; i < orders.length; i++) {
                const order = orders[i];
                const requiredFactory = order.factory;
                let selectedTruck = null, candidateIndex = -1;
                for (let j = 0; j < availableTrucks.length; j++) {
                    if (lastFactoryForTruck[availableTrucks[j].number] !== requiredFactory) {
                        selectedTruck = availableTrucks[j];
                        candidateIndex = j;
                        break;
                    }
                }
                if (!selectedTruck && availableTrucks.length) { selectedTruck = availableTrucks[0]; candidateIndex = 0; }
                if (!selectedTruck) { showToast('خطأ في التوزيع', 'error'); break; }
                availableTrucks.splice(candidateIndex, 1);
                lastFactoryForTruck[selectedTruck.number] = requiredFactory;
                const currentRoad = Math.floor(i / trucks.length) + 1;
                distribution.push({
                    orderId: order.id,
                    orderIndex: i + 1,
                    truck: selectedTruck,
                    factory: order.factory,
                    material: order.material,
                    time: order.time || '',
                    road: currentRoad
                });
                if (availableTrucks.length === 0) availableTrucks = [...trucks];
            }
            const success = await saveData();
            showLoading(false);
            if (success) {
                renderDistribution();
                updateStats();
                const maxRoad = distribution.length ? Math.max(...distribution.map(d => d.road)) : 1;
                showToast(`✅ تم توزيع ${distribution.length} طلب (آخر رود: ${maxRoad})`, 'success');
            }
        }

        async function resetDistribution() {
            if (!confirm('إعادة تعيين التوزيع؟')) return;
            distribution = [];
            if (await saveData()) {
                renderDistribution();
                updateStats();
                showToast('تم إعادة التعيين', 'info');
            }
        }

        function renderDistribution() {
            const tbody = document.getElementById('distributionTable');
            if (!distribution.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px;">لا يوجد توزيع</td></tr>';
                return;
            }
            tbody.innerHTML = distribution.map((d, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${d.truck?.number || '?'}</strong></td>
                    <td>${d.truck?.driver || '?'}</td>
                    <td>${d.factory}</td>
                    <td>بحص ${d.material}</td>
                    <td>${d.time && d.time !== 'undefined' ? `<span class="time-badge">⏰ ${d.time}</span>` : '-'}</td>
                    <td><span class="road-badge road-${d.road}">رود ${d.road}</span></td>
                </tr>
            `).join('');
        }

        function showToast(msg, type) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function logout() {
            if (confirm('تسجيل الخروج؟')) fetch('/api/logout', { method: 'POST', credentials: 'include' }).then(() => window.location.href = '/login.html');
        }

        function loadNav() {
            fetch('/api/me', { credentials: 'include' })
                .then(r => r.json())
                .then(data => {
                    if (data.user) {
                        document.getElementById('navLinks').innerHTML = `
                            <a href="index.html" class="nav-link">📊 الرئيسية</a>
                            <a href="orders.html" class="nav-link">📝 الطلبات</a>
                            <a href="distribution.html" class="nav-link active">🚚 التوزيع</a>
                            <a href="trucks.html" class="nav-link">🚛 السيارات</a>
                            <a href="products.html" class="nav-link">📦 أنواع البحص</a>
                            <a href="factories.html" class="nav-link">🏭 المصانع</a>
                            <a href="reports.html" class="nav-link">📊 التقارير</a>
                            <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
                            <a href="restrictions.html" class="nav-link">⛔ الحظر</a>
                            <a href="users.html" class="nav-link">👥 المستخدمين</a>
                            <a href="logs.html" class="nav-link">📜 السجلات</a>
                        `;
                    } else {
                        window.location.href = '/login.html';
                    }
                })
                .catch(() => { window.location.href = '/login.html'; });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            loadNav();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('orderDate').value = today;
            currentDate = today;
            showLoading(true);
            try {
                await loadSettings();
                await loadData();
            } catch (e) {
                showToast('حدث خطأ أثناء تحميل الصفحة', 'error');
            } finally {
                showLoading(false);
            }
        });
    </script>
</body>
</html>
