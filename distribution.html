<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توزيع الطلبات - كسارة الحبردي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; position: relative; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: center; }
        .stat-card .number { font-size: 2em; font-weight: bold; color: #38ef7d; }
        .section { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .section h2 { margin-bottom: 15px; color: #4facfe; }
        .action-buttons { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(102,126,234,0.3); }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .btn-danger { background: #eb3349; color: #fff; }
        .btn-info { background: #4facfe; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.85em; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #a8b2d1; }
        .form-group select, .form-group input { width: 100%; padding: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: #fff; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; }
        .toast { padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; font-weight: 600; }
        .toast-success { background: #11998e; }
        .toast-error { background: #eb3349; }
        .toast-info { background: #4facfe; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; flex-direction: column; z-index: 2000; }
        .loading.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { table { display: block; overflow-x: auto; } }
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
<div class="toast-container" id="toastContainer"></div>
<div class="container">
    <div class="header">
        <h1>🚚 توزيع الطلبات - كسارة الحبردي</h1>
        <div style="position: absolute; top: 20px; left: 20px;"><button onclick="logout()" style="background: linear-gradient(135deg, #f5576c, #eb3349); border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;">🚪 تسجيل الخروج</button></div>
    </div>
    <div class="nav-links" id="navLinks"></div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="section">
        <h2>📋 الطلبات غير الموزعة</h2>
        <div class="action-buttons">
            <button class="btn btn-success" onclick="fairDistribute()">🔄 توزيع عادل (تلقائي)</button>
            <button class="btn btn-info" onclick="exportPendingOrders()">📥 تصدير الطلبات</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="pendingOrdersTable">
                <thead><tr><th>#</th><th>المصنع</th><th>نوع البحص</th><th>المسافة (كم)</th><th>التوقيت</th><th>وقت الإضافة</th><th>توزيع يدوي</th></tr></thead>
                <tbody id="pendingOrdersBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h2>🚛 التوزيع الحالي</h2>
        <div class="action-buttons">
            <button class="btn btn-warning" onclick="clearAllDistribution()">🗑️ مسح كل التوزيع</button>
        </div>
        <div style="overflow-x: auto;">
            <table id="distributionTable">
                <thead><tr><th>#</th><th>رقم السيارة</th><th>السائق</th><th>المصنع</th><th>نوع البحص</th><th>الرود</th><th>المسافة (كم)</th><th>الإجراءات</th></tr></thead>
                <tbody id="distributionBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- مودال التوزيع اليدوي -->
<div class="modal" id="distributeModal">
    <div class="modal-content">
        <h3>🖐️ توزيع يدوي</h3>
        <input type="hidden" id="distributeOrderId">
        <div class="form-group">
            <label>رقم السيارة</label>
            <select id="truckSelect"></select>
        </div>
        <div class="form-group">
            <label>الرود</label>
            <input type="number" id="roadNumber" min="1" value="1">
        </div>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn btn-danger" onclick="closeModal()">إلغاء</button>
            <button class="btn btn-success" onclick="confirmDistribute()">توزيع</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';
    let currentDate = '';
    let orders = [];          // الطلبات غير الموزعة
    let allOrders = [];       // جميع الطلبات
    let distribution = [];    // التوزيع الحالي
    let trucks = [];
    let currentUserRole = '';
    let currentUserFactory = '';

    // ==================== بيانات المسافات الصحيحة للمصانع ====================
    const FACTORY_DISTANCES = {
        "مصنع الفهد": 337.99,
        "مصنع قوة معمارية": 339.87,
        "مصنع سارمكس النظيم": 352.64,
        "مصنع القيشان 3": 396.22,
        "مصنع القيشان 1": 396.22,
        "شركة الحارث للمنتجات الاسمنيه حي المنار": 401.37,
        "شركة برينسا للخرسانة الجاهزه": 403.21,
        "مصنع الاحجار الشرقية": 416.11,
        "شركة ابتك للخرسانة الجاهزه": 418.11,
        "شركةالحارث للمنتجات الاسمنتية": 420.4,
        "مصنع باسل أبو الرب وشريكه": 420.6,
        "شركة عبر الخليج": 427.48,
        "مصنع المعجل": 431.01,
        "مصنع نبراس2": 439.61,
        "مصنع دعم وحلول الدرعية": 441.05,
        "مصنع نبراس الخليج": 448.99,
        "الحارث العزيزية": 475.49,
        "انشاءات دبي": 522.92,
        "الشركة الصينية": 605.51,
        "شركة اعمار": 662.14,
        // مرادفات
        "الحارث للمنتجات الاسمنيه": 401.37,
        "الحارث للمنتجات الاسمنتية": 420.4,
        "الحارث": 401.37,
        "برينسا": 403.21,
        "القيشان": 396.22,
        "نبراس": 448.99
    };

    function getFactoryDistance(factoryName) {
        if (!factoryName) return 150;
        if (FACTORY_DISTANCES[factoryName]) return FACTORY_DISTANCES[factoryName];
        const normalized = factoryName.trim().toLowerCase();
        for (let key in FACTORY_DISTANCES) {
            if (key.toLowerCase() === normalized) return FACTORY_DISTANCES[key];
        }
        for (let key in FACTORY_DISTANCES) {
            if (normalized.includes(key.toLowerCase()) || key.toLowerCase().includes(normalized)) {
                return FACTORY_DISTANCES[key];
            }
        }
        console.warn(`⚠️ لم يتم العثور على مسافة للمصنع: "${factoryName}"، سيتم استخدام 150 كم`);
        return 150;
    }

    async function apiCall(endpoint, method = 'GET', data = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
        if (data) options.body = JSON.stringify(data);
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function loadCurrentUser() {
        try {
            const me = await apiCall('/me');
            currentUserRole = me.user.role;
            currentUserFactory = me.user.factory;
        } catch(e) { console.error(e); }
    }

    async function loadSettings() {
        const data = await apiCall('/settings');
        trucks = data.trucks || [];
    }

    async function loadDayData() {
        const today = new Date().toISOString().split('T')[0];
        currentDate = today;
        const data = await apiCall(`/day/${today}`);
        allOrders = data.orders || [];
        const savedDistribution = data.distribution || [];
        
        const distributedOrderIds = new Set(savedDistribution.map(d => d.orderId));
        orders = allOrders.filter(o => !distributedOrderIds.has(o.id));
        distribution = savedDistribution;
        
        renderStats();
        renderPendingOrders();
        renderDistribution();
    }

    function renderStats() {
        const totalOrders = orders.length;
        const totalDistributed = distribution.length;
        const uniqueTrucks = new Set(distribution.map(d => d.truck?.number)).size;
        const roads = new Set(distribution.map(d => d.road));
        const lastRoad = roads.size ? Math.max(...roads) : 0;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="number">${totalOrders}</div><p>⏳ طلبات غير موزعة</p></div>
            <div class="stat-card"><div class="number">${totalDistributed}</div><p>✅ تم توزيعها</p></div>
            <div class="stat-card"><div class="number">${uniqueTrucks}</div><p>🚛 سيارات شاركت</p></div>
            <div class="stat-card"><div class="number">${lastRoad}</div><p>🔄 آخر رود</p></div>
        `;
    }

    function renderPendingOrders() {
        const tbody = document.getElementById('pendingOrdersBody');
        if (!orders.length) {
            tbody.innerHTML = '<tr><td colspan="7">لا توجد طلبات غير موزعة</td></tr>';
            return;
        }
        tbody.innerHTML = orders.map((order, idx) => {
            const distance = getFactoryDistance(order.factory);
            return `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${order.factory}</td>
                    <td>${order.material}</td>
                    <td>${distance.toFixed(2)} كم</td>
                    <td>${order.time || '-'}</td>
                    <td>${order.timestamp || '-'}</td>
                    <td><button class="btn btn-warning btn-sm" onclick="openDistributeModal('${order.id}')">🖐️ توزيع</button></td>
                </tr>
            `;
        }).join('');
    }

    function renderDistribution() {
        const tbody = document.getElementById('distributionBody');
        if (!distribution.length) {
            tbody.innerHTML = '<tr><td colspan="8">لا توجد توزيعات بعد</td></tr>';
            return;
        }
        tbody.innerHTML = distribution.map((d, idx) => {
            const distance = getFactoryDistance(d.factory);
            return `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${d.truck?.number || '?'}</td>
                    <td>${d.truck?.driver || '?'}</td>
                    <td>${d.factory}</td>
                    <td>${d.material}</td>
                    <td>رود ${d.road}</td>
                    <td>${distance.toFixed(2)} كم</td>
                    <td><button class="btn btn-danger btn-sm" onclick="removeDistribution(${idx})">🗑️ حذف</button></td>
                </tr>
            `;
        }).join('');
    }

    // ==================== خوارزمية التوزيع العادل (التلقائي) ====================
    async function fairDistribute() {
        if (currentUserRole === 'client') {
            showToast('❌ ليس لديك صلاحية للتوزيع', 'error');
            return;
        }
        if (orders.length === 0) {
            showToast('لا توجد طلبات غير موزعة', 'error');
            return;
        }
        if (trucks.length === 0) {
            showToast('لا توجد سيارات مسجلة، أضف سيارات أولاً', 'error');
            return;
        }
        showLoading(true);
        try {
            // إحصائيات السيارات من التوزيع الحالي
            let truckStats = trucks.map(truck => {
                const existing = distribution.filter(d => d.truck?.number === truck.number);
                const trips = existing.length;
                const totalDistance = existing.reduce((sum, d) => sum + getFactoryDistance(d.factory), 0);
                const lastFactory = existing.length ? existing[existing.length-1].factory : null;
                return {
                    ...truck,
                    trips,
                    totalDistance,
                    lastFactory
                };
            });
            
            let pendingOrders = [...orders];
            let newDistributions = [];
            let currentRoad = 1;
            const maxRoad = 10;
            
            while (pendingOrders.length > 0 && currentRoad <= maxRoad) {
                let availableTrucks = [...truckStats];
                let roadOrders = [];
                
                for (let i = 0; i < availableTrucks.length && pendingOrders.length > 0; i++) {
                    // ترتيب حسب الأقل رحلات ثم الأعلى مسافة
                    availableTrucks.sort((a, b) => {
                        if (a.trips !== b.trips) return a.trips - b.trips;
                        return b.totalDistance - a.totalDistance;
                    });
                    
                    let selectedIndex = -1;
                    for (let j = 0; j < availableTrucks.length; j++) {
                        const truck = availableTrucks[j];
                        if (truck.lastFactory !== pendingOrders[0]?.factory) {
                            selectedIndex = j;
                            break;
                        }
                    }
                    if (selectedIndex === -1 && availableTrucks.length > 0) selectedIndex = 0;
                    if (selectedIndex === -1) break;
                    
                    const selectedTruck = availableTrucks[selectedIndex];
                    const order = pendingOrders.shift();
                    if (!order) break;
                    
                    newDistributions.push({
                        orderId: order.id,
                        orderIndex: distribution.length + newDistributions.length + 1,
                        truck: { number: selectedTruck.number, driver: selectedTruck.driver },
                        factory: order.factory,
                        material: order.material,
                        time: order.time || '',
                        road: currentRoad
                    });
                    
                    selectedTruck.trips++;
                    selectedTruck.totalDistance += getFactoryDistance(order.factory);
                    selectedTruck.lastFactory = order.factory;
                    availableTrucks.splice(selectedIndex, 1);
                }
                currentRoad++;
            }
            
            if (newDistributions.length === 0) {
                showToast('لا يمكن توزيع أي طلب، تأكد من وجود سيارات', 'error');
                showLoading(false);
                return;
            }
            
            const finalDistribution = [...distribution, ...newDistributions];
            await apiCall(`/day/${currentDate}`, 'PUT', { orders: allOrders, distribution: finalDistribution });
            showToast(`✅ تم توزيع ${newDistributions.length} طلب بعدالة (آخر رود: ${currentRoad-1})`, 'success');
            await loadDayData();
        } catch(e) {
            showToast('خطأ في التوزيع: ' + e.message, 'error');
        }
        showLoading(false);
    }

    async function clearAllDistribution() {
        if (!confirm('⚠️ تحذير: سيتم مسح جميع التوزيعات الحالية. هل أنت متأكد؟')) return;
        showLoading(true);
        try {
            await apiCall(`/day/${currentDate}`, 'PUT', { orders: allOrders, distribution: [] });
            showToast('✅ تم مسح جميع التوزيعات', 'success');
            await loadDayData();
        } catch(e) {
            showToast('خطأ: ' + e.message, 'error');
        }
        showLoading(false);
    }

    function exportPendingOrders() {
        if (!orders.length) { showToast('لا توجد طلبات للتصدير', 'error'); return; }
        const data = orders.map((o, i) => ({
            '#': i+1,
            'المصنع': o.factory,
            'نوع البحص': o.material,
            'المسافة (كم)': getFactoryDistance(o.factory).toFixed(2),
            'التوقيت': o.time || '',
            'وقت الإضافة': o.timestamp || ''
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'طلبات غير موزعة');
        XLSX.writeFile(wb, `طلبات_غير_موزعة_${currentDate}.xlsx`);
        showToast('✅ تم التصدير', 'success');
    }

    function openDistributeModal(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        document.getElementById('distributeOrderId').value = orderId;
        const truckSelect = document.getElementById('truckSelect');
        if (trucks.length === 0) {
            showToast('لا توجد سيارات مسجلة', 'error');
            return;
        }
        truckSelect.innerHTML = trucks.map(t => `<option value="${t.number}">${t.number} - ${t.driver}</option>`).join('');
        document.getElementById('distributeModal').classList.add('active');
    }

    async function confirmDistribute() {
        const orderId = document.getElementById('distributeOrderId').value;
        const truckNumber = document.getElementById('truckSelect').value;
        const road = parseInt(document.getElementById('roadNumber').value);
        const order = orders.find(o => o.id === orderId);
        if (!order) { showToast('الطلب غير موجود', 'error'); closeModal(); return; }
        const truck = trucks.find(t => t.number === truckNumber);
        if (!truck) { showToast('السيارة غير موجودة', 'error'); return; }
        
        const newDist = {
            orderId: order.id,
            orderIndex: distribution.length + 1,
            truck: truck,
            factory: order.factory,
            material: order.material,
            time: order.time || '',
            road: road
        };
        distribution.push(newDist);
        
        try {
            await apiCall(`/day/${currentDate}`, 'PUT', { orders: allOrders, distribution: distribution });
            showToast('✅ تم توزيع الطلب', 'success');
            await loadDayData();
        } catch(e) {
            showToast('خطأ: ' + e.message, 'error');
        }
        closeModal();
    }

    async function removeDistribution(index) {
        if (!confirm('هل أنت متأكد من إلغاء هذا التوزيع؟')) return;
        distribution.splice(index, 1);
        try {
            await apiCall(`/day/${currentDate}`, 'PUT', { orders: allOrders, distribution: distribution });
            showToast('✅ تم إلغاء التوزيع', 'success');
            await loadDayData();
        } catch(e) {
            showToast('خطأ: ' + e.message, 'error');
        }
    }

    function closeModal() {
        document.getElementById('distributeModal').classList.remove('active');
        document.getElementById('roadNumber').value = '1';
    }

    async function logout() {
        if (confirm('تسجيل الخروج؟')) {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        }
    }

    function showToast(msg, type) {
        const c = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.innerText = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function showLoading(show) {
        document.getElementById('loading').classList.toggle('active', show);
    }

    function loadNav() {
        fetch('/api/me', { credentials: 'include' }).then(r => r.json()).then(data => {
            if (data.user) {
                const role = data.user.role;
                let navHtml = '';
                if (role === 'admin' || role === 'user') {
                    navHtml = `
                        <a href="index.html" class="nav-link">📊 الرئيسية</a>
                        <a href="orders.html" class="nav-link">📝 الطلبات</a>
                        <a href="distribution.html" class="nav-link active">🚚 التوزيع</a>
                        <a href="trucks.html" class="nav-link">🚛 السيارات</a>
                        <a href="products.html" class="nav-link">📦 أنواع البحص</a>
                        <a href="factories.html" class="nav-link">🏭 المصانع</a>
                        <a href="reports.html" class="nav-link">📊 تقارير الكسارة</a>
                        <a href="scale_report.html" class="nav-link">⚖️ تقارير الميزان الشهرية</a>
                        <a href="trucks-failed.html" class="nav-link">⚠️ السيارات غير المستوفية</a>
                        <a href="trucks-failed-report.html" class="nav-link">📊 تقرير السيارات غير المستوفية</a>
                        <a href="distribution-quality.html" class="nav-link">📈 جودة التوزيع</a>
                        <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
                        <a href="restrictions.html" class="nav-link">⛔ الحظر</a>
                        <a href="users.html" class="nav-link">👥 المستخدمين</a>
                        <a href="logs.html" class="nav-link">📜 السجلات</a>
                    `;
                } else if (role === 'client') {
                    navHtml = `<a href="orders.html" class="nav-link">📝 طلباتي</a>`;
                }
                document.getElementById('navLinks').innerHTML = navHtml;
            } else window.location.href = '/login.html';
        }).catch(() => window.location.href = '/login.html');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        loadNav();
        showLoading(true);
        await loadCurrentUser();
        await loadSettings();
        await loadDayData();
        showLoading(false);
    });
</script>
