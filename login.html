<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة طلبات البحص</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a8b2d1;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1em;
        }
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }
        .error-msg {
            color: #f5576c;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
        }
        .info {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8em;
            color: #a8b2d1;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🚛 نظام إدارة طلبات البحص</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>👤 اسم المستخدم</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">تسجيل الدخول</button>
            <div id="errorMsg" class="error-msg"></div>
            <div class="info">المدير: Admin | كلمة المرور: ********</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.href = '/index.html';
                } else {
                    errorDiv.textContent = data.error || 'خطأ في تسجيل الدخول';
                }
            } catch (err) {
                errorDiv.textContent = 'خطأ في الاتصال بالسيرفر. تأكد من تشغيل السيرفر.';
            }
        });
    </script>
</body>
</html>
