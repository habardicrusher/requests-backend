<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطلبات - نظام إدارة طلبات البحص</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; position: relative; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; transition: all 0.3s; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .date-section { background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .date-section input[type="date"] { padding: 12px 20px; border-radius: 10px; border: none; background: #fff; color: #333; cursor: pointer; }
        .order-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-weight: 600; color: #a8b2d1; }
        .form-group select, .form-group input { padding: 12px 15px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 1em; }
        .form-group select option { background: #1a1a2e; }
        .form-group .fixed-factory { background: rgba(102,126,234,0.3); padding: 12px 15px; border-radius: 10px; font-weight: bold; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; cursor: pointer; font-size: 1em; font-weight: 600; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: #fff; }
        .btn-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .btn-sm { padding: 8px 15px; font-size: 0.9em; }
        .quick-add-section { margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .quick-add-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .quick-btn { padding: 10px; border: none; border-radius: 8px; background: rgba(102,126,234,0.3); color: #fff; cursor: pointer; transition: all 0.3s; }
        .quick-btn:hover { background: rgba(102,126,234,0.6); transform: scale(1.05); }
        .order-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; border-right: 4px solid #667eea; flex-wrap: wrap; gap: 10px; }
        .order-info { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .order-actions { display: flex; gap: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .close-modal { background: none; border: none; color: #fff; font-size: 1.5em; cursor: pointer; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 10px; color: #fff; font-weight: 600; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .toast-error { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .toast-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display: flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width:768px){ .header h1 { font-size:1.5em; } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header"><h1>📝 إدارة الطلبات</h1>
            <div id="logout-btn-container" style="position: absolute; top: 20px; left: 20px;">
                <button onclick="logout()" style="background: linear-gradient(135deg, #f5576c, #eb3349); border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;">🚪 تسجيل الخروج</button>
            </div>
        </div>
        <div class="nav-links" id="navLinks"></div>
        <div class="date-section">
            <div><label>📅 تاريخ العمل: </label><input type="date" id="orderDate" onchange="loadDayData()"></div>
            <div>
                <button class="btn btn-info" onclick="exportOrdersToExcel()">📥 تصدير Excel</button>
                <button class="btn btn-primary" onclick="manualDistribute()">🔄 توزيع يدوي</button>
            </div>
        </div>

        <h2>➕ إضافة طلب جديد</h2>
        <div class="order-form">
            <div class="form-group" id="factoryFieldContainer">
                <label>🏭 المصنع</label>
                <div id="factorySelectContainer"></div>
            </div>
            <div class="form-group"><label>📦 نوع البحص</label><select id="materialType"></select></div>
            <div class="form-group"><label>🔢 العدد</label><input type="number" id="orderCount" min="1" value="1"></div>
            <div class="form-group"><label>⏰ التوقيت (اختياري)</label><input type="text" id="orderTime" placeholder="مثال: 8 PM"></div>
        </div>
        <button class="btn btn-success" onclick="addOrder()">✅ إضافة الطلب</button>

        <div class="quick-add-section">
            <h4>⚡ إضافة سريعة (اختر المصنع أولاً)</h4>
            <div class="quick-add-grid" id="quickAddButtons"></div>
        </div>

        <h3 style="margin-top: 30px;">📋 طلبات اليوم (<span id="ordersCount">0</span> طلب)</h3>
        <div id="todayOrders"></div>
    </div>

    <div class="modal" id="editOrderModal"><div class="modal-content"><div class="modal-header"><h3>✏️ تعديل الطلب</h3><button class="close-modal" onclick="closeModal('editOrderModal')">&times;</button></div><div class="modal-body"><input type="hidden" id="editOrderId"><div class="form-group" id="editFactoryFieldContainer"><label>🏭 المصنع</label><div id="editFactoryContainer"></div></div><div class="form-group"><label>📦 نوع البحص</label><select id="editOrderMaterial"></select></div><div class="form-group"><label>⏰ التوقيت</label><input type="text" id="editOrderTime" placeholder="اختياري"></div></div><div class="modal-footer"><button class="btn btn-danger" onclick="closeModal('editOrderModal')">إلغاء</button><button class="btn btn-success" onclick="saveOrderEdit()">حفظ</button></div></div></div>

    <script src="notifications.js"></script>
    <script>
        const API_BASE = '/api';
        let factories = [], materials = [], orders = [], currentDate = '';
        let currentDistribution = [];
        let currentUser = null;
        let currentUserFactory = null;
        let currentUserRole = null;

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
            if (data) options.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        setInterval(async () => { try { await fetch('/api/me', { credentials: 'include' }); } catch(e) {} }, 4 * 60 * 1000);

        async function loadCurrentUser() {
            try {
                const me = await apiCall('/me');
                currentUser = me.user;
                currentUserRole = me.user.role;
                currentUserFactory = me.user.factory;
                console.log('User role:', currentUserRole, 'Factory:', currentUserFactory);
            } catch(e) {}
        }

        async function loadSettings() {
            try {
                const data = await apiCall('/settings');
                factories = (data.factories || []).map(f => typeof f === 'object' ? (f.name || f.factory_name || f.text || '') : f);
                materials = (data.materials || []).map(m => typeof m === 'object' ? (m.name || m.material_name || m.text || '') : m);
                updateUI();
                renderQuickAddButtons();
            } catch(e) { showToast('خطأ في تحميل الإعدادات', 'error'); }
        }

        function updateUI() {
            // تحديث حقل المصنع (إما قائمة منسدلة أو نص ثابت)
            const factoryContainer = document.getElementById('factorySelectContainer');
            const editFactoryContainer = document.getElementById('editFactoryContainer');
            
            if (currentUserRole === 'client' && currentUserFactory) {
                // عميل مصنع: يظهر اسم المصنع كنص ثابت
                factoryContainer.innerHTML = `<div class="fixed-factory">${currentUserFactory}</div>`;
                editFactoryContainer.innerHTML = `<div class="fixed-factory">${currentUserFactory}</div>`;
                // تحديث القائمة المنسدلة في quick add (إذا كانت موجودة) - سنستخدم نفس المصنع الثابت
            } else {
                // مدير أو مستخدم داخلي: يظهر قائمة منسدلة بكل المصانع
                const validFactories = factories.filter(f => f && f.trim());
                const factoryOptions = '<option value="">-- اختر --</option>' + validFactories.map(f => `<option value="${f}">${f}</option>`).join('');
                factoryContainer.innerHTML = `<select id="factorySelect" style="width:100%; padding:12px 15px; border-radius:10px; border:2px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff;">${factoryOptions}</select>`;
                editFactoryContainer.innerHTML = `<select id="editOrderFactory" style="width:100%; padding:12px 15px; border-radius:10px; border:2px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff;">${factoryOptions}</select>`;
            }
            
            // تحديث المواد
            const validMaterials = materials.filter(m => m && m.trim());
            const materialOptions = '<option value="">-- اختر --</option>' + validMaterials.map(m => `<option value="${m}">بحص ${m}</option>`).join('');
            const materialSelect = document.getElementById('materialType');
            const editMaterialSelect = document.getElementById('editOrderMaterial');
            if (materialSelect) materialSelect.innerHTML = materialOptions;
            if (editMaterialSelect) editMaterialSelect.innerHTML = materialOptions;
        }
        
        // دالة مساعدة للحصول على المصنع المختار (سواء من القائمة أو النص الثابت)
        function getSelectedFactory() {
            if (currentUserRole === 'client' && currentUserFactory) {
                return currentUserFactory;
            }
            const select = document.getElementById('factorySelect');
            return select ? select.value : '';
        }
        
        function getSelectedEditFactory() {
            if (currentUserRole === 'client' && currentUserFactory) {
                return currentUserFactory;
            }
            const select = document.getElementById('editOrderFactory');
            return select ? select.value : '';
        }

        function renderQuickAddButtons() {
            const container = document.getElementById('quickAddButtons');
            const valid = materials.filter(m => m && m.trim());
            if (!valid.length) { container.innerHTML = '<p>لا توجد أنواع بحص</p>'; return; }
            container.innerHTML = valid.map(m => `<button class="quick-btn" onclick="quickAdd('${m}',1)">${m} ×1</button><button class="quick-btn" onclick="quickAdd('${m}',5)">${m} ×5</button><button class="quick-btn" onclick="quickAdd('${m}',10)">${m} ×10</button>`).join('');
        }

        async function loadDayData() {
            currentDate = document.getElementById('orderDate').value;
            try {
                const data = await apiCall(`/day/${currentDate}`);
                orders = data.orders || [];
                currentDistribution = data.distribution || [];
                renderOrders();
            } catch(e) { orders = []; renderOrders(); showToast('خطأ في تحميل الطلبات', 'error'); }
        }

        async function saveData() {
            try {
                const cleaned = orders.map(o => ({ id: o.id, factory: o.factory, material: o.material, time: (o.time && o.time !== 'undefined' && o.time !== 'null') ? o.time : '', timestamp: o.timestamp }));
                await apiCall(`/day/${currentDate}`, 'PUT', { orders: cleaned, distribution: currentDistribution });
                return true;
            } catch(e) { showToast('خطأ في حفظ البيانات: '+e.message, 'error'); return false; }
        }

        // ==================== التوزيع التلقائي ====================
        async function autoDistributeAfterOrder() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const settings = await apiCall('/settings');
                const trucks = settings.trucks || [];
                
                if (trucks.length === 0) {
                    console.log('لا توجد سيارات للتوزيع');
                    return;
                }
                
                const dayData = await apiCall(`/day/${today}`);
                const orders = dayData.orders || [];
                let distribution = dayData.distribution || [];
                
                if (orders.length === 0) return;
                
                let lastFactoryForTruck = {};
                trucks.forEach(t => { lastFactoryForTruck[t.number] = null; });
                let availableTrucks = [...trucks];
                let newDistribution = [];
                
                for (let i = 0; i < orders.length; i++) {
                    const order = orders[i];
                    const requiredFactory = order.factory;
                    let selectedTruck = null, candidateIndex = -1;
                    
                    for (let j = 0; j < availableTrucks.length; j++) {
                        if (lastFactoryForTruck[availableTrucks[j].number] !== requiredFactory) {
                            selectedTruck = availableTrucks[j];
                            candidateIndex = j;
                            break;
                        }
                    }
                    if (!selectedTruck && availableTrucks.length) {
                        selectedTruck = availableTrucks[0];
                        candidateIndex = 0;
                    }
                    if (!selectedTruck) break;
                    
                    availableTrucks.splice(candidateIndex, 1);
                    lastFactoryForTruck[selectedTruck.number] = requiredFactory;
                    const currentRoad = Math.floor(i / trucks.length) + 1;
                    
                    newDistribution.push({
                        orderId: order.id,
                        orderIndex: i + 1,
                        truck: selectedTruck,
                        factory: order.factory,
                        material: order.material,
                        time: order.time || '',
                        road: currentRoad
                    });
                    
                    if (availableTrucks.length === 0) availableTrucks = [...trucks];
                }
                
                if (newDistribution.length) {
                    await apiCall(`/day/${today}`, 'PUT', { orders, distribution: newDistribution });
                    
                    const trucksUsed = new Set(newDistribution.map(d => d.truck?.number)).size;
                    const lastRoad = newDistribution.length ? Math.max(...newDistribution.map(d => d.road)) : 1;
                    
                    if (typeof notifications !== 'undefined') {
                        notifications.addDistributionNotification({
                            totalOrders: orders.length,
                            trucksUsed: trucksUsed,
                            lastRoad: lastRoad,
                            details: `تم توزيع ${orders.length} طلب على ${trucksUsed} سيارة`
                        });
                    }
                    
                    if (currentUserRole === 'admin') {
                        showToast(`✅ تم توزيع ${orders.length} طلب تلقائياً على ${trucksUsed} سيارة (الرود ${lastRoad})`, 'success');
                    }
                }
            } catch(e) {
                console.error('خطأ في التوزيع التلقائي:', e);
            }
        }

        async function manualDistribute() {
            showLoading(true);
            await autoDistributeAfterOrder();
            await loadDayData();
            showLoading(false);
            showToast('✅ تم إعادة توزيع الطلبات', 'success');
        }

        // ==================== دوال الطلبات ====================
        async function addOrder() {
            const factory = getSelectedFactory();
            const material = document.getElementById('materialType').value;
            const count = parseInt(document.getElementById('orderCount').value);
            let time = document.getElementById('orderTime').value.trim();
            if (time === 'undefined' || time === 'null') time = '';
            if (!factory || !material || !count) {
                showToast('املأ جميع الحقول المطلوبة', 'error');
                return;
            }
            showLoading(true);
            for (let i = 0; i < count; i++) {
                orders.push({
                    id: Date.now() + '_' + Math.random().toString(36).substr(2, 9) + '_' + i,
                    factory,
                    material,
                    time: time,
                    timestamp: new Date().toLocaleTimeString('ar-SA')
                });
            }
            if (await saveData()) {
                renderOrders();
                document.getElementById('orderCount').value = '1';
                document.getElementById('orderTime').value = '';
                showToast(`✅ تم إضافة ${count} طلب`, 'success');
                
                await autoDistributeAfterOrder();
                await loadDayData();
            }
            showLoading(false);
        }

        async function quickAdd(material, count) {
            const factory = getSelectedFactory();
            let time = document.getElementById('orderTime').value.trim();
            if (time === 'undefined' || time === 'null') time = '';
            if (!factory) {
                showToast('اختر المصنع أولاً', 'error');
                return;
            }
            showLoading(true);
            for (let i = 0; i < count; i++) {
                orders.push({
                    id: Date.now() + '_' + Math.random().toString(36).substr(2, 9) + '_' + i,
                    factory,
                    material,
                    time: time,
                    timestamp: new Date().toLocaleTimeString('ar-SA')
                });
            }
            if (await saveData()) {
                renderOrders();
                showToast(`✅ تم إضافة ${count} طلب ${material}`, 'success');
                
                await autoDistributeAfterOrder();
                await loadDayData();
            }
            showLoading(false);
        }

        async function deleteOrder(id) {
            if (confirm('حذف الطلب؟')) {
                orders = orders.filter(o => o.id !== id);
                if (await saveData()) {
                    renderOrders();
                    await autoDistributeAfterOrder();
                    await loadDayData();
                }
            }
        }

        function openEditOrderModal(id) {
            let o = orders.find(o => o.id === id);
            if (o) {
                document.getElementById('editOrderId').value = id;
                if (currentUserRole !== 'client') {
                    const editSelect = document.getElementById('editOrderFactory');
                    if (editSelect) editSelect.value = o.factory;
                }
                const editMaterial = document.getElementById('editOrderMaterial');
                if (editMaterial) editMaterial.value = o.material;
                document.getElementById('editOrderTime').value = (o.time && o.time !== 'undefined') ? o.time : '';
                openModal('editOrderModal');
            }
        }

        async function saveOrderEdit() {
            let id = document.getElementById('editOrderId').value;
            let idx = orders.findIndex(o => o.id === id);
            if (idx !== -1) {
                orders[idx].factory = getSelectedEditFactory();
                orders[idx].material = document.getElementById('editOrderMaterial').value;
                let newTime = document.getElementById('editOrderTime').value.trim();
                if (newTime === 'undefined' || newTime === 'null') newTime = '';
                orders[idx].time = newTime;
                if (await saveData()) {
                    renderOrders();
                    closeModal('editOrderModal');
                    showToast('✅ تم التعديل', 'success');
                    await autoDistributeAfterOrder();
                    await loadDayData();
                }
            }
        }

        function renderOrders() {
            const container = document.getElementById('todayOrders');
            document.getElementById('ordersCount').textContent = orders.length;
            if (!orders.length) {
                container.innerHTML = '<p style="text-align:center;padding:30px;">لا توجد طلبات</p>';
                return;
            }
            container.innerHTML = orders.map((o, i) => {
                let timeDisplay = '';
                if (o.time && o.time !== 'undefined' && o.time !== 'null' && o.time.trim() !== '') {
                    timeDisplay = `<span>⏰ ${o.time}</span>`;
                }
                return `
                    <div class="order-item">
                        <div class="order-info">
                            <span><strong>#${i+1}</strong></span>
                            <span>🏭 ${o.factory}</span>
                            <span>📦 ${o.material}</span>
                            ${timeDisplay}
                            <span>🕐 ${o.timestamp || '—'}</span>
                        </div>
                        <div class="order-actions">
                            <button class="btn btn-sm btn-warning" onclick="openEditOrderModal('${o.id}')">✏️</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteOrder('${o.id}')">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function exportOrdersToExcel() {
            if (!orders.length) { showToast('لا توجد طلبات للتصدير', 'error'); return; }
            const data = orders.map((o, i) => ({
                '#': i+1,
                'المصنع': o.factory,
                'نوع البحص': o.material,
                'التوقيت': (o.time && o.time !== 'undefined') ? o.time : '',
                'وقت الإضافة': o.timestamp || '—'
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'الطلبات');
            XLSX.writeFile(wb, `طلبات_${currentDate}.xlsx`);
            showToast('✅ تم التصدير', 'success');
        }

        function showToast(msg,type) { const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className=`toast toast-${type}`; t.innerText=msg; c.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function showLoading(s) { document.getElementById('loading').classList.toggle('active', s); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { if(confirm('تسجيل الخروج؟')) fetch('/api/logout',{method:'POST',credentials:'include'}).then(()=>window.location.href='/login.html'); }
        
        function loadNav() { 
            fetch('/api/me',{credentials:'include'}).then(r=>r.json()).then(data=>{ 
                if(data.user) {
                    const isAdmin = data.user.role === 'admin';
                    const isClient = data.user.role === 'client';
                    document.getElementById('navLinks').innerHTML = isAdmin ? `
                        <a href="index.html" class="nav-link">📊 الرئيسية</a>
                        <a href="orders.html" class="nav-link active">📝 الطلبات</a>

            document.getElementById('orderDate').value = today; 
            currentDate = today; 
            showLoading(true); 
            await loadSettings(); 
            await loadDayData(); 
            showLoading(false); 
            
            // قراءة معامل الفلتر من الرابط (للمدير فقط)
            const urlParams = new URLSearchParams(window.location.search);
            const filterFactory = urlParams.get('filter');
            if (filterFactory && currentUserRole !== 'client') {
                setTimeout(() => {
                    const factorySelect = document.getElementById('factorySelect');
                    if (factorySelect) {
                        for(let i = 0; i < factorySelect.options.length; i++) {
                            if(factorySelect.options[i].value === filterFactory) {
                                factorySelect.selectedIndex = i;
                                break;
                            }
                        }
                        showToast(`تم التحديد تلقائياً: ${filterFactory}`, 'info');
                    }
                }, 500);
