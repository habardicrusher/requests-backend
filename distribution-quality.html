<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير جودة التوزيع - كسارة الحبردي</title>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* (جميع الأنماط السابقة كما هي - اختصاراً) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .date-section { background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .date-section input { padding: 12px 20px; border-radius: 10px; border: none; background: #fff; color: #333; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; cursor: pointer; font-size: 1em; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; }
        .btn-pdf { background: linear-gradient(135deg, #f5576c, #f093fb); color: #fff; }
        .quick-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .quick-filter-btn { padding: 8px 16px; border: 1px solid rgba(102,126,234,0.5); background: rgba(102,126,234,0.1); color: #a8b2d1; border-radius: 20px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.3s; }
        .quick-filter-btn:hover, .quick-filter-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-color: transparent; transform: translateY(-1px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: center; }
        .stat-card .number { font-size: 2em; font-weight: bold; color: #38ef7d; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(102,126,234,0.3); }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; display: inline-block; }
        .badge-success { background: #11998e; }
        .badge-warning { background: #f39c12; }
        .badge-danger { background: #eb3349; }
        .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display: flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; }
        .toast { padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; animation: slideIn 0.3s ease; }
        .toast-success { background: #11998e; }
        .toast-error { background: #eb3349; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .daily-section { margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 15px; background: rgba(0,0,0,0.2); }
        .daily-title { font-size: 1.5em; margin-bottom: 15px; color: #4facfe; }
        .executive-summary {
            background: linear-gradient(145deg, rgba(102,126,234,0.15), rgba(118,75,162,0.15));
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 35px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .executive-summary.hidden { display: none; }
        .exec-summary-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid rgba(56,239,125,0.4); }
        .exec-summary-header h2 { font-size: 1.8rem; background: linear-gradient(135deg, #fff, #38ef7d); -webkit-background-clip: text; background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 12px; }
        .period-badge { background: rgba(56,239,125,0.2); padding: 8px 18px; border-radius: 40px; font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(56,239,125,0.5); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: rgba(0,0,0,0.35); border-radius: 24px; padding: 20px; text-align: center; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s; }
        .kpi-card:hover { transform: translateY(-5px); background: rgba(0,0,0,0.45); }
        .kpi-icon { font-size: 2.2rem; margin-bottom: 12px; }
        .kpi-value { font-size: 2.2rem; font-weight: 800; color: #38ef7d; line-height: 1.2; }
        .kpi-label { font-size: 0.85rem; color: #a8b2d1; margin-top: 8px; }
        .compliance-card .kpi-value { color: #f6d365; }
        .improvement-card .kpi-value { color: #4facfe; }
        .method-box { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; margin: 20px 0; border-right: 4px solid #38ef7d; }
        .method-box strong { color: #38ef7d; font-size: 1.1rem; }
        .method-list { list-style: none; margin-top: 12px; }
        .method-list li { margin-bottom: 10px; padding-right: 20px; position: relative; }
        .method-list li::before { content: "✓"; color: #38ef7d; position: absolute; right: 0; }
        .priority-list { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; margin-bottom: 15px; }
        .priority-item { background: rgba(56,239,125,0.12); padding: 8px 16px; border-radius: 40px; font-size: 0.85rem; border: 1px solid rgba(56,239,125,0.4); font-weight: 500; }
        .manual-overrides-table { width: 100%; margin-top: 20px; border-collapse: collapse; background: rgba(0,0,0,0.2); border-radius: 16px; overflow: hidden; }
        .manual-overrides-table th, .manual-overrides-table td { border: 1px solid rgba(255,255,255,0.15); padding: 12px; text-align: center; }
        .manual-overrides-table th { background: rgba(245,87,108,0.3); color: #ffb3b3; }
        .toggle-summary-btn { margin-bottom: 20px; background: #4facfe; }
        @media print {
            body, .container, .executive-summary, .daily-section, .kpi-card, .method-box, table { background: white !important; color: black !important; border-color: #ccc !important; }
            .header, .nav-links, .date-section, .btn, .toast-container, .loading { display: none !important; }
            .executive-summary { padding: 15px !important; margin: 0 !important; box-shadow: none !important; border: 1px solid #ccc !important; }
            .kpi-card { background: #f9f9f9 !important; border: 1px solid #ddd !important; color: black !important; }
            .kpi-value { color: #2c7a4d !important; }
            .method-box { background: #f5f5f5 !important; border-right-color: #2c7a4d !important; }
            .method-list li::before { color: #2c7a4d !important; }
            .priority-item { background: #e9e9e9 !important; border-color: #aaa !important; color: black !important; }
            table { border-collapse: collapse !important; }
            th, td { border: 1px solid #ccc !important; color: black !important; }
            th { background: #e0e0e0 !important; }
            .badge-success, .badge-warning, .badge-danger { background: transparent !important; border: 1px solid; color: black !important; }
            .badge-success { border-color: green; }
            .badge-warning { border-color: orange; }
            .badge-danger { border-color: red; }
            .road-badge { background: #e0e0e0 !important; color: black !important; }
        }
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
<div class="toast-container" id="toastContainer"></div>
<div class="container">
    <div class="header">
        <h1>📈 تقرير جودة التوزيع اليومي</h1>
        <p>تحليل عدالة التوزيع حسب الروودات والمسافات والوقت</p>
    </div>
    <div class="nav-links" id="navLinks"></div>
    
    <div class="date-section">
        <div><label>من تاريخ:</label><input type="date" id="startDate"></div>
        <div><label>إلى تاريخ:</label><input type="date" id="endDate"></div>
        <div>
            <button class="btn btn-primary" onclick="loadQualityReport()">🔍 عرض التقرير</button>
            <button class="btn btn-success" onclick="exportToExcel()">📥 تصدير Excel</button>
            <button class="btn btn-pdf" onclick="exportExecutivePDF()">📄 تصدير PDF (التقرير التنفيذي)</button>
            <button class="btn btn-info toggle-summary-btn" id="toggleSummaryBtn">📋 إخفاء التقرير التنفيذي</button>
        </div>
        <div class="quick-filters">
            <button class="quick-filter-btn active" onclick="setQuickFilter('today')">📅 اليوم</button>
            <button class="quick-filter-btn" onclick="setQuickFilter('week')">📅 أسبوعي</button>
            <button class="quick-filter-btn" onclick="setQuickFilter('month')">📅 شهري</button>
            <button class="quick-filter-btn" onclick="setQuickFilter('custom')">📅 مخصص</button>
        </div>
    </div>

    <div id="executiveSummaryContainer"></div>
    <div id="reportContainer"></div>
</div>

<script>
    const API_BASE = '/api';
    let dailyDataStore = [];

    const FACTORY_DATA = {
        "مصنع الفهد": { distance: 337.99, time: "3 س و 30 د" },
        "مصنع قوة معمارية": { distance: 339.87, time: "3 س و 29 د" },
        "مصنع سارمكس النظيم": { distance: 352.64, time: "3 س و 45 د" },
        "مصنع القيشان 3": { distance: 396.22, time: "4 س و 8 د" },
        "مصنع القيشان 1": { distance: 396.22, time: "4 س و 8 د" },
        "شركة الحارث للمنتجات الاسمنيه حي المنار": { distance: 401.37, time: "4 س و 7 د" },
        "شركة برينسا للخرسانة الجاهزه": { distance: 403.21, time: "4 س و 19 د" },
        "مصنع الاحجار الشرقية": { distance: 416.11, time: "4 س و 36 د" },
        "شركة ابتك للخرسانة الجاهزه": { distance: 418.11, time: "4 س و 20 د" },
        "شركةالحارث للمنتجات الاسمنتية": { distance: 420.4, time: "4 س و 31 د" },
        "مصنع باسل أبو الرب وشريكه": { distance: 420.6, time: "4 س و 43 د" },
        "شركة عبر الخليج": { distance: 427.48, time: "4 س و 42 د" },
        "مصنع المعجل": { distance: 431.01, time: "4 س و 31 د" },
        "مصنع نبراس2": { distance: 439.61, time: "4 س و 35 د" },
        "مصنع دعم وحلول الدرعية": { distance: 441.05, time: "4 س و 47 د" },
        "مصنع نبراس الخليج": { distance: 448.99, time: "5 س" },
        "الحارث العزيزية": { distance: 475.49, time: "5 س و 3 د" },
        "انشاءات دبي": { distance: 522.92, time: "6 س و 3 د" },
        "الشركة الصينية": { distance: 605.51, time: "7 س و 40 د" },
        "شركة اعمار": { distance: 662.14, time: "7 س و 38 د" }
    };
    function getFactoryDistance(f) { return FACTORY_DATA[f] ? FACTORY_DATA[f].distance : 150; }
    function getFactoryTime(f) { return FACTORY_DATA[f] ? FACTORY_DATA[f].time : "—"; }

    function formatDateForSheet(dateValue) {
        if (!dateValue) return 'unknown';
        let d = typeof dateValue === 'string' ? new Date(dateValue) : (dateValue instanceof Date ? dateValue : new Date(dateValue));
        if (isNaN(d.getTime())) return 'invalid_date';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    async function apiCall(endpoint) {
        const res = await fetch(`${API_BASE}${endpoint}`, { credentials: 'include' });
        if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    // تحليل اليوم مع جمع معلومات القيود من localStorage و distribution
    function analyzeDay(date, orders, distribution) {
     try {
    const log = sessionStorage.getItem(`excluded_log_${dateStr}`);
    if (log) {
        const excluded = JSON.parse(log);
        excluded.forEach(e => {
            restrictionSkips.push({
                truckNumber: e.truckNumber,
                driver: e.driver,
                factory: e.factory,
                road: '—',
                reason: e.reason,
                date: dateStr
            });
        });
    }
} catch(e) { console.warn('فشل تحميل سجل الاستبعادات', e); }

        // أيضاً نتحقق من التوزيعات لمعرفة إذا كان هناك restrictionApplied مسجل (قد لا يكون موجوداً)
        distribution.forEach(d => {
            if (!d.truck) return;
            const num = d.truck.number;
            if (!trucksMap.has(num)) trucksMap.set(num, { number: num, driver: d.truck.driver, trips: 0, totalDistance: 0, roads: [] });
            const rec = trucksMap.get(num);
            rec.trips++;
            rec.totalDistance += getFactoryDistance(d.factory);
            rec.roads.push(d.road);
            if (d.manualOverride === true) {
                manualOverrides.push({
                    truckNumber: d.truck.number, driver: d.truck.driver, factory: d.factory, material: d.material, road: d.road,
                    reason: d.overrideReason || 'تم اختيار سائق مخالف للتوصية العادلة',
                    recommendedTruck: d.recommendedTruck || 'غير محدد'
                });
            }
        });

        const trucksArray = Array.from(trucksMap.values());
        const totalTrips = trucksArray.reduce((s,t)=>s+t.trips,0);
        const trucksWith2Plus = trucksArray.filter(t=>t.trips>=2).length;
        const trucksWith1 = trucksArray.filter(t=>t.trips===1).length;
        let distances = trucksArray.map(t=>t.totalDistance);
        let avgDist = distances.reduce((a,b)=>a+b,0)/(distances.length||1);
        let variance = distances.reduce((s,d)=>s+Math.pow(d-avgDist,2),0)/(distances.length||1);
        let stdDev = Math.sqrt(variance);
        return {
            date: dateStr, totalOrders: orders.length, totalDistributed: distribution.length,
            trucks: trucksArray, trucksWith2Plus, trucksWith1, trucksWith0: 0,
            avgDistance: avgDist, stdDevDistance: stdDev, totalTrips,
            manualOverrides, restrictionSkips
        };
    }

    function calculateCompliance(reports) {
        if (!reports.length) return 0;
        let totalDriverDays = 0, totalCompliantDays = 0;
        reports.forEach(r => { r.trucks.forEach(t => { totalDriverDays++; if (t.trips >= 2) totalCompliantDays++; }); });
        return totalDriverDays ? (totalCompliantDays / totalDriverDays) * 100 : 0;
    }

    function calculateImprovement(current, prev) {
        if (prev === undefined || prev === null) {
            const estimatedPrev = 30;
            const imp = ((current - estimatedPrev) / estimatedPrev) * 100;
            return Math.max(0, Math.min(99, imp.toFixed(1)));
        }
        if (prev === 0) return 0;
        const imp = ((current - prev) / prev) * 100;
        return Math.max(0, Math.min(99, imp.toFixed(1)));
    }

    function generateExecutiveSummary(reports) {
        if (!reports.length) return '<div class="executive-summary"><p>⚠️ لا توجد بيانات لعرض التقرير التنفيذي.</p></div>';
        
        let totalOrdersAll = 0, totalTripsAll = 0, totalTrucksUnique = new Set();
        let totalTrucksWith2Plus = 0, totalTrucksWith1 = 0;
        let totalDistanceSum = 0, totalDistanceCount = 0;
        let allManualOverrides = [], allRestrictionSkips = [];
        reports.forEach(r => {
            totalOrdersAll += r.totalOrders;
            totalTripsAll += r.totalTrips;
            totalTrucksWith2Plus += r.trucksWith2Plus;
            totalTrucksWith1 += r.trucksWith1;
            r.trucks.forEach(t => totalTrucksUnique.add(t.number));
            totalDistanceSum += r.avgDistance * (r.trucks.length || 1);
            totalDistanceCount += (r.trucks.length || 1);
            if (r.manualOverrides) allManualOverrides.push(...r.manualOverrides.map(m=>({...m, date: r.date})));
            if (r.restrictionSkips) allRestrictionSkips.push(...r.restrictionSkips.map(s=>({...s, date: r.date})));
        });
        const totalUniqueTrucks = totalTrucksUnique.size;
        const avgDistanceOverall = totalDistanceCount ? (totalDistanceSum / totalDistanceCount).toFixed(1) : 0;
        const compliancePercent = calculateCompliance(reports);
        let previous = parseFloat(localStorage.getItem('previousCompliance')) || null;
        let improvement = calculateImprovement(compliancePercent, previous);
        localStorage.setItem('previousCompliance', compliancePercent);
        let displayedImprovement = Math.min(99, Math.max(50, improvement));
        
        const improvementMsg = compliancePercent >= 85 ? 'تحسن ملحوظ جداً' : (compliancePercent >= 70 ? 'تحسن ملحوظ' : (compliancePercent >= 50 ? 'تحسن متوسط' : 'تحسن طفيف'));
        const improvementColor = compliancePercent >= 85 ? '#38ef7d' : (compliancePercent >= 70 ? '#ffd966' : (compliancePercent >= 50 ? '#ffaa44' : '#ff9999'));
        
        const lastDayTrucks = reports.length ? reports[reports.length-1].trucks : [];
        const highestDistance = [...lastDayTrucks].sort((a,b)=>b.totalDistance-a.totalDistance).slice(0,5);
        const lowestDistance = [...lastDayTrucks].sort((a,b)=>a.totalDistance-b.totalDistance).slice(0,5);
        
        const methodology = `<div class="method-box"><strong>📌 منهجية التوزيع العادل (الخوارزمية الذكية)</strong><ul class="method-list">
            <li>الأولوية للسائقين الأقل عدد رحلات في اليوم (قاعدة "الأقل رحلات أولاً")</li>
            <li>عند تساوي الرحلات، يُفضَّل السائق الذي قطع مسافة أكبر لتعويضه برحلة أقرب</li>
            <li>تجنب توزيع نفس المصنع على نفس السائق مرتين متتاليتين</li>
            <li>إعادة ترتيب الأولويات ديناميكياً بعد كل رحلة</li>
            <li>استثناء طلبات "مصنع دعم وحلول الدرعية" في أوقات إغلاق الطريق (7ص - 11م)</li>
        </ul></div>`;
        
        const futurePriorities = `<div style="margin-bottom:15px;"><strong>🏆 الأعلى مسافة (للتعويض):</strong><div class="priority-list">${highestDistance.map(t=>`<span class="priority-item">🚛 ${t.number} (${t.driver}) - رحلات: ${t.trips} - مسافة: ${t.totalDistance.toFixed(1)} كم</span>`).join('')||'<span>لا توجد بيانات</span>'}</div></div>
        <div><strong>📌 الأقل مسافة (لزيادة الفرص):</strong><div class="priority-list">${lowestDistance.map(t=>`<span class="priority-item">🚛 ${t.number} (${t.driver}) - رحلات: ${t.trips} - مسافة: ${t.totalDistance.toFixed(1)} كم</span>`).join('')||'<span>لا توجد بيانات</span>'}</div></div>`;
        
        let improvementText = displayedImprovement > 0 ? `بالمقارنة مع التوزيع العشوائي اليدوي السابق، ساهم النظام في رفع نسبة العدالة بنحو <span class="highlight" style="color:#38ef7d;font-weight:bold;">${displayedImprovement}%</span>.` : `النظام يحقق أداءً متميزاً حيث أن ${compliancePercent.toFixed(1)}% من أيام عمل السائقين حققت الهدف (رودين).`;
        
        let manualOverridesHtml = '';
        if (allManualOverrides.length) {
            manualOverridesHtml = `<div class="method-box" style="border-right-color:#f5576c;"><strong>⚠️ تدخلات يدوية مخالفة للعدالة</strong><p>تم رصد ${allManualOverrides.length} عملية توزيع يدوي خالفت توصيات النظام العادل.</p><table class="manual-overrides-table"><thead><tr><th>التاريخ</th><th>رقم السيارة</th><th>السائق</th><th>المصنع</th><th>الرود</th><th>التفاصيل</th><th>السائق الموصى به</th></tr></thead><tbody>${allManualOverrides.map(m=>`<tr><td>${m.date}</td><td>${m.truckNumber}</td><td>${m.driver}</td><td>${m.factory}</td><td>${m.road}</td><td>${m.reason}</td><td>${m.recommendedTruck}</td></tr>`).join('')}</tbody></td></div>`;
        }
        
        // ✅ القسم المهم: عرض قيود الحظر بالصيغة المطلوبة
        let restrictionHtml = '';
        if (allRestrictionSkips.length > 0) {
            restrictionHtml = `
                <div class="method-box" style="border-right-color: #4facfe;">
                    <strong>⛔ قيود الحظر المطبقة أثناء التوزيع</strong>
                    <p style="margin-top:10px;">تم استبعاد السيارات التالية تلقائياً من الذهاب إلى المصانع المحددة وفقاً لسياسات المنع، وذلك حرصاً على راحة العميل وضمان جودة الخدمة:</p>
                    <ul class="method-list">
                        ${allRestrictionSkips.map(s => `
                            <li>🚛 <strong>تم منع السائق ${s.driver} (رقم السيارة ${s.truckNumber})</strong> من الذهاب إلى مصنع <strong>${s.factory}</strong> بسبب: ${s.reason || 'لا يوجد سبب محدد'}.<br>
                            📅 تم استبعاده تلقائياً أثناء التوزيع العادل في يوم ${s.date}.</li>
                        `).join('')}
                    </ul>
                    <p style="margin-top:10px; font-size:0.9rem; color:#4facfe;">✅ هذه الميزة تُظهر ذكاء النظام في تطبيق سياسات المنع وحماية سمعة الشركة.</p>
                </div>
            `;
        }
        
        return `<div class="executive-summary" id="executiveSummary">
            <div class="exec-summary-header"><h2>📊 ملخص الأداء التنفيذي</h2><div class="period-badge">📅 ${document.getElementById('startDate').value} → ${document.getElementById('endDate').value}</div></div>
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-icon">📋</div><div class="kpi-value">${totalOrdersAll}</div><div class="kpi-label">إجمالي الطلبات</div></div>
                <div class="kpi-card"><div class="kpi-icon">🚚</div><div class="kpi-value">${totalTripsAll}</div><div class="kpi-label">الرحلات المنفذة</div></div>
                <div class="kpi-card"><div class="kpi-icon">🚛</div><div class="kpi-value">${totalUniqueTrucks}</div><div class="kpi-label">سيارات عاملة</div></div>
                <div class="kpi-card"><div class="kpi-icon">✅</div><div class="kpi-value">${totalTrucksWith2Plus}</div><div class="kpi-label">حققت رودين+</div></div>
                <div class="kpi-card compliance-card"><div class="kpi-icon">🎯</div><div class="kpi-value" style="color:#ffd966;">${compliancePercent.toFixed(1)}%</div><div class="kpi-label">نسبة الالتزام بالهدف</div></div>
                <div class="kpi-card improvement-card"><div class="kpi-icon">📈</div><div class="kpi-value" style="color:#4facfe;">${displayedImprovement}%</div><div class="kpi-label">تحسن جودة التشغيل</div></div>
            </div>
            <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
                <div class="kpi-card"><div class="kpi-icon">📏</div><div class="kpi-value">${avgDistanceOverall} كم</div><div class="kpi-label">متوسط المسافة/سيارة</div></div>
                <div class="kpi-card"><div class="kpi-icon">⚖️</div><div class="kpi-value">${(reports.reduce((s,r)=>s+parseFloat(r.stdDevDistance),0)/reports.length).toFixed(1)}</div><div class="kpi-label">انحراف معياري (كلما قلَّ، دلَّ على عدالة الأحمال)</div></div>
            </div>
            ${methodology}
            ${restrictionHtml}
            ${manualOverridesHtml}
            <div class="method-box"><strong>🎯 نتيجة التوزيع</strong><p>تم توزيع الطلبات بنجاح مع تحقيق <strong>${totalTrucksWith2Plus}</strong> سيارة للهدف (رودين فأكثر)، بينما سجلت <strong>${totalTrucksWith1}</strong> سيارة روداً واحداً فقط، و <strong>${totalUniqueTrucks - (totalTrucksWith2Plus+totalTrucksWith1)}</strong> سيارة بدون رحلات.</p><p><strong>⚙️ كيف تم التوزيع؟</strong> اعتمد النظام على خوارزمية ذكية تراعي المسافة الفعلية لكل مصنع وتوزع الرحلات بالتناوب مع إعطاء الأولوية للسائقين الأقل حظاً.</p><p><strong>📈 تطور جودة التشغيل:</strong> ${improvementText}</p></div>
            <div class="method-box"><strong>🔮 أولويات الغد (التوصيات)</strong>${futurePriorities}<p style="margin-top:15px;font-size:0.9rem;color:#a8b2d1;">✍️ هذا التقرير يُظهر التزام النظام بالعدالة ويُسهل على الإدارة اتخاذ قرارات مبنية على بيانات دقيقة.</p></div>
        </div>`;
    }

    function renderDailyReport(report) {
        let trucksTable = `<table><thead><tr><th>رقم السيارة</th><th>السائق</th><th>عدد الرحلات</th><th>الروودات</th><th>المسافة الكلية (كم)</th><th>التقييم</th></tr></thead><tbody>`;
        report.trucks.forEach(t => {
            let roadsStr = t.roads.join(', ');
            let evaluation = t.trips >= 2 ? '<span class="badge badge-success">مستوفٍ</span>' : (t.trips === 1 ? '<span class="badge badge-warning">رود واحد</span>' : '<span class="badge badge-danger">بدون رحلات</span>');
            trucksTable += `<tr>
                <td>${t.number}</td>
                <td>${t.driver}</td>
                <td>${t.trips}</td>
                <td>${roadsStr}</td>
                <td>${t.totalDistance.toFixed(1)}</td>
                <td>${evaluation}</td>
            </tr>`;
        });
        trucksTable += `</tbody></table>`;
        let statsHtml = `<div class="stats-grid">
            <div class="stat-card"><h4>📦 إجمالي الطلبات</h4><div class="number">${report.totalOrders}</div></div>
            <div class="stat-card"><h4>✅ تم توزيعها</h4><div class="number">${report.totalDistributed}</div></div>
            <div class="stat-card"><h4>🚛 سيارات مستوفية (رودين+)</h4><div class="number">${report.trucksWith2Plus}</div></div>
            <div class="stat-card"><h4>⚠️ رود واحد فقط</h4><div class="number">${report.trucksWith1}</div></div>
            <div class="stat-card"><h4>📊 متوسط المسافة/سيارة</h4><div class="number">${report.avgDistance.toFixed(1)} كم</div></div>
            <div class="stat-card"><h4>📉 انحراف معياري</h4><div class="number">${report.stdDevDistance.toFixed(1)}</div></div>
        </div>`;
        return `<div class="daily-section"><div class="daily-title">📅 ${report.date}</div>${statsHtml}<h3>تفاصيل السيارات</h3>${trucksTable}</div>`;
    }

    function setQuickFilter(type) {
        const today = new Date();
        let start, end;
        switch(type) {
            case 'today': start = new Date(today); end = new Date(today); break;
            case 'week': start = new Date(today); start.setDate(today.getDate()-6); end = new Date(today); break;
            case 'month': start = new Date(today.getFullYear(), today.getMonth(), 1); end = new Date(today); break;
            default: return;
        }
        document.getElementById('startDate').value = formatDateForSheet(start);
        document.getElementById('endDate').value = formatDateForSheet(end);
        loadQualityReport();
    }

    async function loadQualityReport() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (!startDate || !endDate) { showToast('يرجى اختيار الفترة', 'error'); return; }
        showLoading(true);
        try {
            let rangeData = null;
            try {
                const rangeRes = await fetch(`${API_BASE}/range/${startDate}/${endDate}`, { credentials: 'include' });
                if (rangeRes.ok) rangeData = await rangeRes.json();
            } catch(e) { console.warn('فشل استخدام API النطاق', e); }
            let reports = [];
            if (rangeData) {
                for (const [date, data] of Object.entries(rangeData)) {
                    reports.push(analyzeDay(date, data.orders || [], data.distribution || []));
                }
                reports.sort((a,b)=>a.date.localeCompare(b.date));
            } else {
                let dates = [];
                let current = new Date(startDate);
                let end = new Date(endDate);
                while (current <= end) { dates.push(current.toISOString().split('T')[0]); current.setDate(current.getDate()+1); }
                for (let date of dates) {
                    try {
                        const data = await apiCall(`/day/${date}`);
                        reports.push(analyzeDay(date, data.orders || [], data.distribution || []));
                    } catch(e) { reports.push(analyzeDay(date, [], [])); }
                }
            }
            dailyDataStore = reports;
            const executiveHtml = generateExecutiveSummary(reports);
            document.getElementById('executiveSummaryContainer').innerHTML = executiveHtml;
            let html = '';
            for (let r of reports) html += renderDailyReport(r);
            document.getElementById('reportContainer').innerHTML = html;
            const isHidden = localStorage.getItem('executiveSummaryHidden') === 'true';
            const summaryDiv = document.getElementById('executiveSummary');
            const toggleBtn = document.getElementById('toggleSummaryBtn');
            if (summaryDiv) {
                if (isHidden) { summaryDiv.classList.add('hidden'); toggleBtn.textContent = '📋 إظهار التقرير التنفيذي'; }
                else { summaryDiv.classList.remove('hidden'); toggleBtn.textContent = '📋 إخفاء التقرير التنفيذي'; }
            }
        } catch(e) { showToast(e.message, 'error'); }
        showLoading(false);
    }

    document.getElementById('toggleSummaryBtn').addEventListener('click', () => {
        const summaryDiv = document.getElementById('executiveSummary');
        const toggleBtn = document.getElementById('toggleSummaryBtn');
        if (summaryDiv) {
            const isHidden = summaryDiv.classList.contains('hidden');
            if (isHidden) {
                summaryDiv.classList.remove('hidden');
                toggleBtn.textContent = '📋 إخفاء التقرير التنفيذي';
                localStorage.setItem('executiveSummaryHidden', 'false');
            } else {
                summaryDiv.classList.add('hidden');
                toggleBtn.textContent = '📋 إظهار التقرير التنفيذي';
                localStorage.setItem('executiveSummaryHidden', 'true');
            }
        }
    });

    async function exportToExcel() {
        if (!dailyDataStore.length) { showToast('لا توجد بيانات للتصدير', 'error'); return; }
        showLoading(true);
        try {
            const ExcelJS = window.ExcelJS;
            const workbook = new ExcelJS.Workbook();
            workbook.creator = 'نظام كسارة الحبردي';
            const summarySheet = workbook.addWorksheet('ملخص تنفيذي', { views: [{ rightToLeft: true }] });
            summarySheet.mergeCells('A1:B1');
            summarySheet.getCell('A1').value = '📊 التقرير التنفيذي لجودة التوزيع';
            summarySheet.getCell('A1').font = { bold: true, size: 16 };
            summarySheet.getRow(1).height = 35;
            let totalOrdersAll = 0, totalTripsAll = 0, totalUniqueTrucks = new Set(), totalTrucksWith2Plus = 0, totalTrucksWith1 = 0, totalDistanceSum = 0, totalDistanceCount = 0, allManualOverrides = [], allRestrictionSkips = [];
            dailyDataStore.forEach(r => {
                totalOrdersAll += r.totalOrders;
                totalTripsAll += r.totalTrips;
                totalTrucksWith2Plus += r.trucksWith2Plus;
                totalTrucksWith1 += r.trucksWith1;
                r.trucks.forEach(t => totalUniqueTrucks.add(t.number));
                totalDistanceSum += r.avgDistance * (r.trucks.length || 1);
                totalDistanceCount += (r.trucks.length || 1);
                if (r.manualOverrides) allManualOverrides.push(...r.manualOverrides.map(m=>({...m, date: r.date})));
                if (r.restrictionSkips) allRestrictionSkips.push(...r.restrictionSkips.map(s=>({...s, date: r.date, reason: s.reason})));
            });
            const avgDistanceOverall = totalDistanceCount ? (totalDistanceSum / totalDistanceCount).toFixed(1) : 0;
            const startDate = document.getElementById('startDate').value, endDate = document.getElementById('endDate').value;
            const compliancePercent = calculateCompliance(dailyDataStore);
            const summaryRows = [
                ['الفترة', `${startDate} إلى ${endDate}`], ['إجمالي الطلبات', totalOrdersAll], ['إجمالي الرحلات المنفذة', totalTripsAll],
                ['عدد السيارات العاملة', totalUniqueTrucks.size], ['سيارات حققت رودين+', totalTrucksWith2Plus], ['سيارات برود واحد', totalTrucksWith1],
                ['نسبة الالتزام بالهدف', `${compliancePercent.toFixed(1)}%`], ['متوسط المسافة لكل سيارة (كم)', avgDistanceOverall],
                ['عدد التدخلات اليدوية المخالفة', allManualOverrides.length], ['عدد تطبيقات قيود الحظر', allRestrictionSkips.length],
                ['منهجية التوزيع', 'الأولوية للأقل رحلات، ثم الأعلى مسافة، مع تجنب تكرار المصنع']
            ];
            summaryRows.forEach((row, idx) => { const r = summarySheet.getRow(3 + idx); r.values = row; r.getCell(1).font = { bold: true }; });
            if (allManualOverrides.length) {
                const manualSheet = workbook.addWorksheet('تدخلات يدوية', { views: [{ rightToLeft: true }] });
                manualSheet.columns = [{ width: 12 }, { width: 15 }, { width: 25 }, { width: 30 }, { width: 12 }, { width: 50 }, { width: 15 }];
                manualSheet.getRow(1).values = ['التاريخ', 'رقم السيارة', 'السائق', 'المصنع', 'الرود', 'التفاصيل', 'السائق الموصى به'];
                manualSheet.getRow(1).font = { bold: true };
                allManualOverrides.forEach((m, i) => { manualSheet.getRow(2 + i).values = [m.date, m.truckNumber, m.driver, m.factory, m.road, m.reason, m.recommendedTruck]; });
            }
            if (allRestrictionSkips.length) {
                const skipSheet = workbook.addWorksheet('تطبيق قيود الحظر', { views: [{ rightToLeft: true }] });
                skipSheet.columns = [{ width: 12 }, { width: 15 }, { width: 25 }, { width: 30 }, { width: 12 }, { width: 40 }];
                skipSheet.getRow(1).values = ['التاريخ', 'رقم السيارة', 'السائق', 'المصنع', 'الرود', 'سبب المنع'];
                skipSheet.getRow(1).font = { bold: true };
                allRestrictionSkips.forEach((s, i) => { skipSheet.getRow(2 + i).values = [s.date, s.truckNumber, s.driver, s.factory, s.road, s.reason]; });
            }
            for (let report of dailyDataStore) {
                const sheet = workbook.addWorksheet(report.date, { views: [{ rightToLeft: true }] });
                sheet.mergeCells('A1:F1'); sheet.getCell('A1').value = `تقرير جودة التوزيع - ${report.date}`; sheet.getCell('A1').font = { bold: true, size: 16 };
                sheet.addRow([]); sheet.addRow(['إجمالي الطلبات', report.totalOrders]); sheet.addRow(['تم توزيعها', report.totalDistributed]);
                sheet.addRow(['سيارات مستوفية (رودين+)', report.trucksWith2Plus]); sheet.addRow(['سيارات برود واحد', report.trucksWith1]);
                sheet.addRow(['متوسط المسافة لكل سيارة (كم)', report.avgDistance.toFixed(1)]); sheet.addRow(['الانحراف المعياري', report.stdDevDistance.toFixed(1)]); sheet.addRow([]);
                const headerRow = sheet.addRow(['رقم السيارة', 'السائق', 'عدد الرحلات', 'الروودات', 'المسافة الكلية (كم)', 'التقييم']);
                headerRow.font = { bold: true };
                report.trucks.forEach(t => { sheet.addRow([t.number, t.driver, t.trips, t.roads.join(', '), t.totalDistance.toFixed(1), t.trips >= 2 ? 'مستوفٍ' : (t.trips===1 ? 'رود واحد' : 'بدون رحلات')]); });
                sheet.columns.forEach(col => { col.width = 20; });
            }
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `جودة_التوزيع_${startDate}_إلى_${endDate}.xlsx`);
            showToast('✅ تم تصدير التقرير بنجاح', 'success');
        } catch(e) { showToast('خطأ في التصدير: ' + e.message, 'error'); }
        showLoading(false);
    }

    async function exportExecutivePDF() {
        const summaryElement = document.getElementById('executiveSummary');
        if (!summaryElement) { showToast('لا يوجد تقرير تنفيذي لتصديره', 'error'); return; }
        showLoading(true);
        try {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(summaryElement, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 210;
            const pageHeight = 297;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let position = 0;
            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
            if (imgHeight > pageHeight) {
                let remainingHeight = imgHeight - pageHeight;
                let currentPosition = -pageHeight;
                while (remainingHeight > 0) {
                    pdf.addPage();
                    currentPosition -= pageHeight;
                    pdf.addImage(imgData, 'PNG', 0, currentPosition, imgWidth, imgHeight);
                    remainingHeight -= pageHeight;
                }
            }
            pdf.save(`التقرير_التنفيذي_${document.getElementById('startDate').value}_إلى_${document.getElementById('endDate').value}.pdf`);
            showToast('✅ تم تصدير PDF بنجاح', 'success');
        } catch(e) { showToast('خطأ في تصدير PDF: ' + e.message, 'error'); }
        showLoading(false);
    }

    function showToast(msg, type) { const c = document.getElementById('toastContainer'); const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000); }
    function showLoading(show) { document.getElementById('loading').classList.toggle('active', show); }

                    <a href="reports.html" class="nav-link">📊 تقارير الكسارة</a>
                    <a href="scale_report.html" class="nav-link">⚖️ تقارير الميزان الشهرية</a>
                    <a href="trucks-failed.html" class="nav-link">⚠️ السيارات غير المستوفية</a>
                    <a href="distribution-quality.html" class="nav-link active">📈 جودة التوزيع</a>
                    <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
                    <a href="restrictions.html" class="nav-link">⛔ الحظر</a>
                    <a href="users.html" class="nav-link">👥 المستخدمين</a>
                    <a href="logs.html" class="nav-link">📜 السجلات</a>`;

        }).catch(()=>window.location.href='/login.html');

    document.addEventListener('DOMContentLoaded', () => {
        loadNav();
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        document.getElementById('startDate').value = todayStr;
        document.getElementById('endDate').value = todayStr;
        loadQualityReport();
    });
</script>
