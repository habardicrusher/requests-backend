<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير جودة التوزيع - كسارة الحبردي</title>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        /* شريط التنقل الكامل */
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 20px;
        }
        .nav-link {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: translateY(-2px);
        }
        .logout-btn {
            background: #eb3349;
            margin-right: auto;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        /* قسم التاريخ */
        .date-section {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .date-section input {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #fff;
            color: #333;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; }
        .btn-pdf { background: linear-gradient(135deg, #f5576c, #f093fb); color: #fff; }
        .toggle-summary-btn { background: #4facfe; color: #fff; }
        .quick-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .quick-filter-btn {
            padding: 8px 16px;
            border: 1px solid rgba(102,126,234,0.5);
            background: rgba(102,126,234,0.1);
            color: #a8b2d1;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s;
        }
        .quick-filter-btn:hover, .quick-filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
        }
        /* بطاقات الإحصائيات اليومية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 1.8em;
            font-weight: bold;
            color: #38ef7d;
        }
        /* الجدول الرئيسي */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        thead th {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #1e2a5e, #0f172a);
            color: #fff;
            padding: 12px 8px;
            border-bottom: 2px solid #38ef7d;
            white-space: nowrap;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            vertical-align: middle;
            word-break: break-word;
        }
        tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
        tbody tr:hover { background: rgba(102,126,234,0.2); }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-success { background: #11998e; }
        .badge-warning { background: #f39c12; }
        .badge-danger { background: #eb3349; }
        /* التقرير التنفيذي */
        .executive-summary {
            background: linear-gradient(145deg, rgba(102,126,234,0.15), rgba(118,75,162,0.15));
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 35px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .executive-summary.hidden { display: none; }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: rgba(0,0,0,0.35);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }
        .kpi-value {
            font-size: 2rem;
            font-weight: 800;
            color: #38ef7d;
        }
        .method-box {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border-right: 4px solid #38ef7d;
        }
        .method-list {
            list-style: none;
            margin-top: 12px;
        }
        .method-list li {
            margin-bottom: 10px;
            padding-right: 20px;
            position: relative;
        }
        .method-list li::before {
            content: "✓";
            color: #38ef7d;
            position: absolute;
            right: 0;
        }
        .restriction-item {
            background: rgba(235,51,73,0.2);
            border-right: 4px solid #eb3349;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
        }
        /* إحصائيات إضافية أسفل الجدول */
        .extra-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 16px;
        }
        .extra-stat {
            flex: 1;
            text-align: center;
            font-size: 0.9rem;
        }
        .extra-stat span {
            display: block;
            font-size: 1.3rem;
            font-weight: bold;
            color: #f6d365;
        }
        /* التوست والتحميل */
        .loading {
            display: none;
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.8);
            z-index:2000;
            align-items:center;
            justify-content:center;
            flex-direction:column;
        }
        .loading.active { display: flex; }
        .spinner {
            width:50px;
            height:50px;
            border:4px solid rgba(255,255,255,0.3);
            border-top-color:#667eea;
            border-radius:50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3000;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #11998e; }
        .toast-error { background: #eb3349; }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .table-wrapper { overflow-x: auto; }
            td { white-space: normal; }
            .extra-stats { flex-direction: column; }
        }
        @media print {
            body, .container, .executive-summary, .table-wrapper, table { background: white !important; color: black !important; }
            .header, .nav-links, .date-section, .btn, .toast-container, .loading { display: none !important; }
            th, td { border: 1px solid #ccc !important; color: black !important; }
        }
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
<div class="toast-container" id="toastContainer"></div>
<div class="container">
    <div class="header">
        <h1>📈 تقرير جودة التوزيع اليومي</h1>
        <p>تحليل عدالة التوزيع حسب الرحلات والمسافات والمصانع</p>
    </div>
    <div class="nav-links" id="navLinks"></div>
    
    <div class="date-section">
        <div>
            <div><label>من تاريخ:</label><input type="date" id="startDate"></div>
            <div><label>إلى تاريخ:</label><input type="date" id="endDate"></div>
        </div>
        <div>
            <button class="btn btn-primary" onclick="loadQualityReport()">🔍 عرض التقرير</button>
            <button class="btn btn-success" onclick="exportToExcel()">📥 تصدير Excel</button>
            <button class="btn btn-pdf" onclick="exportExecutivePDF()">📄 تصدير PDF (التقرير التنفيذي)</button>
            <button class="btn toggle-summary-btn" id="toggleSummaryBtn">📋 إخفاء التقرير التنفيذي</button>
        </div>
        <div class="quick-filters">
            <button class="quick-filter-btn active" onclick="setQuickFilter('today')">📅 اليوم</button>
            <button class="quick-filter-btn" onclick="setQuickFilter('week')">📅 أسبوعي</button>
            <button class="quick-filter-btn" onclick="setQuickFilter('month')">📅 شهري</button>
        </div>
    </div>

    <div id="executiveSummaryContainer"></div>
    <div id="reportContainer"></div>
</div>

<script>
    // ==================== الإعدادات ====================
    const API_BASE = '/api';
    let dailyDataStore = [];

    // بيانات المصانع (المسافات وأسماء حقيقية)
    const FACTORY_DATA = {
        "مصنع الفهد": { distance: 337.99, time: "3 س و 30 د" },
        "مصنع قوة معمارية": { distance: 339.87, time: "3 س و 29 د" },
        "مصنع سارمكس النظيم": { distance: 352.64, time: "3 س و 45 د" },
        "مصنع القيشان 3": { distance: 396.22, time: "4 س و 8 د" },
        "مصنع القيشان 1": { distance: 396.22, time: "4 س و 8 د" },
        "شركة الحارث للمنتجات الاسمنتية": { distance: 401.37, time: "4 س و 7 د" },
        "شركة برينسا للخرسانة": { distance: 403.21, time: "4 س و 19 د" },
        "مصنع الاحجار الشرقية": { distance: 416.11, time: "4 س و 36 د" },
        "شركة ابتك للخرسانة": { distance: 418.11, time: "4 س و 20 د" },
        "مصنع باسل أبو الرب": { distance: 420.6, time: "4 س و 43 د" },
        "شركة عبر الخليج": { distance: 427.48, time: "4 س و 42 د" },
        "مصنع المعجل": { distance: 431.01, time: "4 س و 31 د" },
        "مصنع نبراس2": { distance: 439.61, time: "4 س و 35 د" },
        "مصنع دعم وحلول الدرعية": { distance: 441.05, time: "4 س و 47 د" },
        "مصنع نبراس الخليج": { distance: 448.99, time: "5 س" },
        "الحارث العزيزية": { distance: 475.49, time: "5 س و 3 د" },
        "انشاءات دبي": { distance: 522.92, time: "6 س و 3 د" },
        "الشركة الصينية": { distance: 605.51, time: "7 س و 40 د" },
        "شركة اعمار": { distance: 662.14, time: "7 س و 38 د" }
    };
    function getFactoryDistance(f) { return FACTORY_DATA[f] ? FACTORY_DATA[f].distance : 150; }
    function getFactoryName(f) { return f; }

    // تنسيق التاريخ
    function formatDateForSheet(dateValue) {
        if (!dateValue) return 'unknown';
        let d = typeof dateValue === 'string' ? new Date(dateValue) : (dateValue instanceof Date ? dateValue : new Date(dateValue));
        if (isNaN(d.getTime())) return 'invalid_date';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // تنظيف النص للعرض
    function cleanDisplayText(text) {
        if (!text) return '—';
        return text.toString().trim();
    }

    // ==================== دوال API ====================
    async function apiCall(endpoint) {
        const res = await fetch(`${API_BASE}${endpoint}`, { credentials: 'include' });
        if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    // تحليل يوم واحد مع إضافة المصانع والمستبعدين
    function analyzeDay(date, orders, distribution) {
        const dateStr = formatDateForSheet(date);
        const trucksMap = new Map();
        const manualOverrides = [];
        const restrictionSkips = [];

        // استرجاع سجل الاستبعادات من sessionStorage (للمصنع المحدد)
        try {
            const log = sessionStorage.getItem(`excluded_log_${dateStr}`);
            if (log) {
                const excluded = JSON.parse(log);
                excluded.forEach(e => {
                    restrictionSkips.push({
                        truckNumber: e.truckNumber,
                        driver: e.driver,
                        factory: e.factory,
                        reason: e.reason,
                        date: dateStr
                    });
                });
            }
        } catch(e) { console.warn('فشل تحميل سجل الاستبعادات', e); }

        // تجميع بيانات السيارات مع المصانع والمسافات
        distribution.forEach(d => {
            if (!d.truck) return;
            const num = d.truck.number;
            if (!trucksMap.has(num)) {
                trucksMap.set(num, {
                    number: num,
                    driver: d.truck.driver,
                    trips: 0,
                    totalDistance: 0,
                    roads: [],
                    factories: [],   // أسماء المصانع التي راح لها
                    factoryDistances: []
                });
            }
            const rec = trucksMap.get(num);
            rec.trips++;
            const dist = getFactoryDistance(d.factory);
            rec.totalDistance += dist;
            rec.roads.push(d.road || 'غير محدد');
            rec.factories.push(d.factory);
            rec.factoryDistances.push(dist);
            if (d.manualOverride === true) {
                manualOverrides.push({
                    truckNumber: d.truck.number,
                    driver: d.truck.driver,
                    factory: d.factory,
                    road: d.road,
                    reason: d.overrideReason || 'تم اختيار سائق مخالف للتوصية العادلة',
                    recommendedTruck: d.recommendedTruck || 'غير محدد',
                    date: dateStr
                });
            }
        });

        const trucksArray = Array.from(trucksMap.values());
        const totalTrips = trucksArray.reduce((s,t)=>s+t.trips,0);
        const trucksWith2Plus = trucksArray.filter(t=>t.trips>=2).length;
        const trucksWith1 = trucksArray.filter(t=>t.trips===1).length;
        let distances = trucksArray.map(t=>t.totalDistance);
        let avgDist = distances.reduce((a,b)=>a+b,0)/(distances.length||1);
        let variance = distances.reduce((s,d)=>s+Math.pow(d-avgDist,2),0)/(distances.length||1);
        let stdDev = Math.sqrt(variance);
        let totalDistanceAll = distances.reduce((a,b)=>a+b,0);

        return {
            date: dateStr,
            totalOrders: orders.length,
            totalDistributed: distribution.length,
            trucks: trucksArray,
            trucksWith2Plus, trucksWith1, trucksWith0: 0,
            avgDistance: avgDist, stdDevDistance: stdDev, totalTrips, totalDistanceAll,
            manualOverrides, restrictionSkips
        };
    }

    // حساب نسبة الالتزام
    function calculateCompliance(reports) {
        if (!reports.length) return 0;
        let totalDriverDays = 0, totalCompliantDays = 0;
        reports.forEach(r => {
            r.trucks.forEach(t => { totalDriverDays++; if (t.trips >= 2) totalCompliantDays++; });
        });
        return totalDriverDays ? (totalCompliantDays / totalDriverDays) * 100 : 0;
    }

    // ==================== عرض التقارير ====================
    // عرض تقرير يوم واحد مع الجدول والإحصائيات الإضافية
    function renderDailyReport(report) {
        let trucksTable = `<div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>رقم السيارة</th>
                        <th>السائق</th>
                        <th>عدد الرحلات</th>
                        <th>الروودات</th>
                        <th>المصانع</th>
                        <th>المسافة الكلية (كم)</th>
                        <th>التقييم</th>
                    </tr>
                </thead>
                <tbody>`;
        
        report.trucks.forEach(t => {
            let roadsStr = t.roads.join(', ');
            let factoriesStr = t.factories.join(' → ');
            let evaluation = t.trips >= 2 ? '<span class="badge badge-success">مستوفٍ</span>' : (t.trips === 1 ? '<span class="badge badge-warning">رود واحد</span>' : '<span class="badge badge-danger">بدون رحلات</span>');
            trucksTable += `<tr>
                <td data-label="رقم السيارة">${cleanDisplayText(t.number)}</td>
                <td data-label="السائق">${cleanDisplayText(t.driver)}</td>
                <td data-label="عدد الرحلات">${t.trips}</td>
                <td data-label="الروودات">${cleanDisplayText(roadsStr)}</td>
                <td data-label="المصانع">${cleanDisplayText(factoriesStr)}</td>
                <td data-label="المسافة الكلية">${t.totalDistance.toFixed(1)}</td>
                <td data-label="التقييم">${evaluation}</td>
            </tr>`;
        });
        
        trucksTable += `</tbody>
            </table>
        </div>`;
        
        // الإحصائيات اليومية
        let statsHtml = `<div class="stats-grid">
            <div class="stat-card"><h4>📦 الطلبات</h4><div class="number">${report.totalOrders}</div></div>
            <div class="stat-card"><h4>✅ تم توزيعها</h4><div class="number">${report.totalDistributed}</div></div>
            <div class="stat-card"><h4>🚛 مستوفية (رودين+)</h4><div class="number">${report.trucksWith2Plus}</div></div>
            <div class="stat-card"><h4>⚠️ رود واحد</h4><div class="number">${report.trucksWith1}</div></div>
            <div class="stat-card"><h4>📊 متوسط المسافة/سيارة</h4><div class="number">${report.avgDistance.toFixed(1)} كم</div></div>
            <div class="stat-card"><h4>📉 انحراف معياري</h4><div class="number">${report.stdDevDistance.toFixed(1)}</div></div>
        </div>`;
        
        // إحصائيات إضافية أسفل الجدول (المسافات المظبوطة)
        let extraStats = `<div class="extra-stats">
            <div class="extra-stat"><span>${report.totalDistanceAll.toFixed(1)} كم</span>إجمالي المسافات المقطوعة</div>
            <div class="extra-stat"><span>${(report.totalDistanceAll / (report.totalTrips||1)).toFixed(1)} كم</span>متوسط المسافة لكل رحلة</div>
            <div class="extra-stat"><span>${report.trucks.length}</span>عدد السيارات العاملة</div>
            <div class="extra-stat"><span>${report.totalTrips}</span>إجمالي الرحلات</div>
        </div>`;
        
        return `<div class="daily-section" style="margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 15px;">
            <div class="daily-title" style="font-size: 1.5em; margin-bottom: 15px; color: #4facfe;">📅 ${report.date}</div>
            ${statsHtml}
            <h3>📋 تفاصيل السيارات والمصانع</h3>
            ${trucksTable}
            ${extraStats}
        </div>`;
    }

    // التقرير التنفيذي المفصل جداً
    function generateExecutiveSummary(reports) {
        if (!reports.length) return '<div class="executive-summary"><p>⚠️ لا توجد بيانات لعرض التقرير التنفيذي.</p></div>';
        
        let totalOrdersAll = 0, totalTripsAll = 0, totalTrucksUnique = new Set();
        let totalTrucksWith2Plus = 0, totalTrucksWith1 = 0;
        let totalDistanceSum = 0, totalDistanceCount = 0, totalDistanceAll = 0;
        let allManualOverrides = [], allRestrictionSkips = [];
        
        reports.forEach(r => {
            totalOrdersAll += r.totalOrders;
            totalTripsAll += r.totalTrips;
            totalTrucksWith2Plus += r.trucksWith2Plus;
            totalTrucksWith1 += r.trucksWith1;
            r.trucks.forEach(t => totalTrucksUnique.add(t.number));
            totalDistanceSum += r.avgDistance * (r.trucks.length || 1);
            totalDistanceCount += (r.trucks.length || 1);
            totalDistanceAll += r.totalDistanceAll || 0;
            if (r.manualOverrides) allManualOverrides.push(...r.manualOverrides.map(m=>({...m, date: r.date})));
            if (r.restrictionSkips) allRestrictionSkips.push(...r.restrictionSkips.map(s=>({...s, date: r.date})));
        });
        
        const totalUniqueTrucks = totalTrucksUnique.size;
        const avgDistanceOverall = totalDistanceCount ? (totalDistanceSum / totalDistanceCount).toFixed(1) : 0;
        const compliancePercent = calculateCompliance(reports);
        let previous = parseFloat(localStorage.getItem('previousCompliance')) || null;
        let improvement = previous ? ((compliancePercent - previous) / previous) * 100 : 0;
        localStorage.setItem('previousCompliance', compliancePercent);
        let displayedImprovement = improvement > 0 ? improvement.toFixed(1) : 0;
        
        // بناء قائمة المستبعدين
        let restrictionHtml = '';
        if (allRestrictionSkips.length) {
            restrictionHtml = `<div class="method-box" style="border-right-color: #eb3349;">
                <strong>⛔ السيارات المستبعدة (تم منعها من الذهاب لمصانع محددة)</strong>
                <p>تم استبعاد السيارات التالية تلقائياً وفق سياسات المنع:</p>
                <ul class="method-list">
                    ${allRestrictionSkips.map(s => `
                        <li class="restriction-item">🚛 <strong>السيارة ${s.truckNumber} (السائق: ${s.driver})</strong> - تم منعها من الذهاب إلى مصنع <strong>${s.factory}</strong><br>
                        📌 السبب: ${s.reason || 'لا يوجد سبب محدد'}<br>
                        📅 التاريخ: ${s.date}</li>
                    `).join('')}
                </ul>
                <p>✅ هذا الإجراء لحماية سمعة الشركة وضمان رضا العملاء.</p>
            </div>`;
        } else {
            restrictionHtml = `<div class="method-box" style="border-right-color: #4facfe;">
                <strong>✅ لا توجد سيارات مستبعدة</strong>
                <p>خلال الفترة المحددة، لم يتم تسجيل أي استبعاد للسيارات من أي مصنع.</p>
            </div>`;
        }
        
        // التدخلات اليدوية
        let manualHtml = '';
        if (allManualOverrides.length) {
            manualHtml = `<div class="method-box" style="border-right-color:#f5576c;">
                <strong>⚠️ التدخلات اليدوية المخالفة (${allManualOverrides.length})</strong>
                <p>تم توزيع الطلبات يدوياً بشكل مخالف لتوصيات النظام العادل:</p>
                <ul class="method-list">
                    ${allManualOverrides.map(m => `
                        <li>📅 ${m.date} - السيارة ${m.truckNumber} (${m.driver}) ذهبت إلى ${m.factory} (رود ${m.road}) بدلاً من السيارة الموصى بها ${m.recommendedTruck} بسبب: ${m.reason}</li>
                    `).join('')}
                </ul>
            </div>`;
        }
        
        return `<div class="executive-summary" id="executiveSummary">
            <div class="exec-summary-header" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2>📊 ملخص الأداء التنفيذي المفصل</h2>
                <div class="period-badge">📅 ${document.getElementById('startDate').value} → ${document.getElementById('endDate').value}</div>
            </div>
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-value">${totalOrdersAll}</div><div class="kpi-label">إجمالي الطلبات</div></div>
                <div class="kpi-card"><div class="kpi-value">${totalTripsAll}</div><div class="kpi-label">الرحلات المنفذة</div></div>
                <div class="kpi-card"><div class="kpi-value">${totalUniqueTrucks}</div><div class="kpi-label">سيارات عاملة</div></div>
                <div class="kpi-card"><div class="kpi-value">${totalTrucksWith2Plus}</div><div class="kpi-label">حققت رودين+</div></div>
                <div class="kpi-card"><div class="kpi-value">${totalTrucksWith1}</div><div class="kpi-label">حققت رود واحد فقط</div></div>
                <div class="kpi-card"><div class="kpi-value" style="color:#ffd966;">${compliancePercent.toFixed(1)}%</div><div class="kpi-label">نسبة الالتزام بالهدف</div></div>
                <div class="kpi-card"><div class="kpi-value" style="color:#4facfe;">${displayedImprovement}%</div><div class="kpi-label">تحسن جودة التشغيل</div></div>
                <div class="kpi-card"><div class="kpi-value">${totalDistanceAll.toFixed(1)} كم</div><div class="kpi-label">إجمالي المسافات المقطوعة</div></div>
                <div class="kpi-card"><div class="kpi-value">${avgDistanceOverall} كم</div><div class="kpi-label">متوسط المسافة لكل سيارة</div></div>
            </div>
            <div class="method-box">
                <strong>📌 منهجية التوزيع العادل (الخوارزمية الذكية)</strong>
                <ul class="method-list">
                    <li>الأولوية للسائقين الأقل عدد رحلات في اليوم (قاعدة "الأقل رحلات أولاً")</li>
                    <li>عند تساوي الرحلات، يُفضَّل السائق الذي قطع مسافة أكبر لتعويضه برحلة أقرب</li>
                    <li>تجنب توزيع نفس المصنع على نفس السائق مرتين متتاليتين</li>
                    <li>إعادة ترتيب الأولويات ديناميكياً بعد كل رحلة</li>
                    <li>تطبيق قيود المنع التلقائي للسيارات الممنوعة من الذهاب لمصانع معينة</li>
                </ul>
            </div>
            ${restrictionHtml}
            ${manualHtml}
            <div class="method-box">
                <strong>🎯 نتائج التوزيع وتحليل العدالة</strong>
                <p>✅ <strong>${totalTrucksWith2Plus}</strong> سيارة حققت الهدف (رودين فأكثر) بنسبة نجاح ${compliancePercent.toFixed(1)}%.</p>
                <p>⚠️ <strong>${totalTrucksWith1}</strong> سيارة حصلت على رود واحد فقط، يُنصح بمراجعة توزيعاتها.</p>
                <p>📉 الانحراف المعياري للمسافات: ${(reports.reduce((s,r)=>s+r.stdDevDistance,0)/reports.length).toFixed(1)} - كلما قلَّ دلَّ على عدالة أكبر.</p>
                <p>📈 التوصية: الاستمرار في تطبيق الخوارزمية مع مراقبة التدخلات اليدوية لتقليلها.</p>
            </div>
        </div>`;
    }

    // تحميل التقرير من الخادم
    async function loadQualityReport() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (!startDate || !endDate) { showToast('يرجى اختيار الفترة', 'error'); return; }
        showLoading(true);
        try {
            let rangeData = null;
            try {
                const rangeRes = await fetch(`${API_BASE}/range/${startDate}/${endDate}`, { credentials: 'include' });
                if (rangeRes.ok) rangeData = await rangeRes.json();
            } catch(e) { console.warn('فشل استخدام API النطاق', e); }
            
            let reports = [];
            if (rangeData) {
                for (const [date, data] of Object.entries(rangeData)) {
                    reports.push(analyzeDay(date, data.orders || [], data.distribution || []));
                }
                reports.sort((a,b)=>a.date.localeCompare(b.date));
            } else {
                let dates = [];
                let current = new Date(startDate);
                let end = new Date(endDate);
                while (current <= end) { dates.push(current.toISOString().split('T')[0]); current.setDate(current.getDate()+1); }
                for (let date of dates) {
                    try {
                        const data = await apiCall(`/day/${date}`);
                        reports.push(analyzeDay(date, data.orders || [], data.distribution || []));
                    } catch(e) { reports.push(analyzeDay(date, [], [])); }
                }
            }
            dailyDataStore = reports;
            document.getElementById('executiveSummaryContainer').innerHTML = generateExecutiveSummary(reports);
            let html = '';
            for (let r of reports) html += renderDailyReport(r);
            document.getElementById('reportContainer').innerHTML = html;
        } catch(e) { showToast(e.message, 'error'); }
        showLoading(false);
    }

    // ==================== التصدير ====================
    async function exportToExcel() {
        if (!dailyDataStore.length) { showToast('لا توجد بيانات للتصدير', 'error'); return; }
        showLoading(true);
        try {
            const ExcelJS = window.ExcelJS;
            const workbook = new ExcelJS.Workbook();
            workbook.creator = 'نظام كسارة الحبردي';
            const summarySheet = workbook.addWorksheet('ملخص تنفيذي', { views: [{ rightToLeft: true }] });
            summarySheet.getCell('A1').value = 'تقرير جودة التوزيع';
            summarySheet.getRow(1).font = { bold: true };
            // يمكن إضافة مزيد من تفاصيل التصدير حسب الحاجة
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `جودة_التوزيع_${formatDateForSheet(new Date())}.xlsx`);
            showToast('✅ تم التصدير بنجاح', 'success');
        } catch(e) { showToast('خطأ: '+e.message, 'error'); }
        showLoading(false);
    }

    async function exportExecutivePDF() {
        const summaryElement = document.getElementById('executiveSummary');
        if (!summaryElement) { showToast('لا يوجد تقرير تنفيذي', 'error'); return; }
        showLoading(true);
        try {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(summaryElement, { scale: 2, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 210;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            pdf.save(`التقرير_التنفيذي_${formatDateForSheet(new Date())}.pdf`);
            showToast('✅ تم تصدير PDF', 'success');
        } catch(e) { showToast('خطأ: '+e.message, 'error'); }
        showLoading(false);
    }

    // فلتر سريع
    function setQuickFilter(type) {
        const today = new Date();
        let start, end;
        switch(type) {
            case 'today': start = new Date(today); end = new Date(today); break;
            case 'week': start = new Date(today); start.setDate(today.getDate()-6); end = new Date(today); break;
            case 'month': start = new Date(today.getFullYear(), today.getMonth(), 1); end = new Date(today); break;
            default: return;
        }
        document.getElementById('startDate').value = formatDateForSheet(start);
        document.getElementById('endDate').value = formatDateForSheet(end);
        loadQualityReport();
    }

    function showToast(msg, type) { 
        const c = document.getElementById('toastContainer'); 
        const t = document.createElement('div'); 
        t.className = `toast toast-${type}`; 
        t.textContent = msg; 
        c.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }
    function showLoading(show) { document.getElementById('loading').classList.toggle('active', show); }

    // تسجيل الخروج
    async function logout() {
        try {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/login.html';
        } catch(e) { window.location.href = '/login.html'; }
    }

    // تحميل شريط التنقل الكامل مع زر خروج

        fetch('/api/me', { credentials: 'include' }).then(r=>r.json()).then(data=>{
            if (data.user) {
                document.getElementById('navLinks').innerHTML = `
                    <a href="index.html" class="nav-link">📊 الرئيسية</a>
                    <a href="orders.html" class="nav-link">📝 الطلبات</a>
                    <a href="distribution.html" class="nav-link">🚚 التوزيع</a>
                    <a href="trucks.html" class="nav-link">🚛 السيارات</a>
                    <a href="products.html" class="nav-link">📦 أنواع البحص</a>
                    <a href="factories.html" class="nav-link">🏭 المصانع</a>
                    <a href="reports.html" class="nav-link">📊 تقارير الكسارة</a>
                    <a href="scale_report.html" class="nav-link">⚖️ تقارير الميزان الشهرية</a>
                    <a href="trucks-failed.html" class="nav-link">⚠️ السيارات غير المستوفية</a>
                    <a href="trucks-failed-report.html" class="nav-link">📊 تقرير السيارات غير المستوفية</a>
                    <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
                    <a href="restrictions.html" class="nav-link">⛔ الحظر</a>
                    <a href="users.html" class="nav-link">👥 المستخدمين</a>
                    <a href="logs.html" class="nav-link">📜 السجلات</a>
                    <a href="#" class="nav-link logout-btn" onclick="logout(); return false;">🚪 تسجيل الخروج</a>
                `;
                // تمييز الرابط النشط (صفحة جودة التوزيع)
                const currentPage = window.location.pathname.split('/').pop();
                document.querySelectorAll('.nav-link').forEach(link => {
                    if (link.getAttribute('href') === currentPage) link.classList.add('active');
                });
            } else window.location.href = '/login.html';
        }).catch(()=>window.location.href='/login.html');
    }

    // بدء التشغيل
    document.addEventListener('DOMContentLoaded', () => {
        loadNav();
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        document.getElementById('startDate').value = todayStr;
        document.getElementById('endDate').value = todayStr;
        loadQualityReport();
        document.getElementById('toggleSummaryBtn').addEventListener('click', () => {
            const sumDiv = document.getElementById('executiveSummary');
            if (sumDiv) sumDiv.classList.toggle('hidden');
        });
    });
</script>
