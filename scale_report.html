<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقارير الميزان الشهرية - كسارة الحبردي</title>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header {
      text-align: center;
      padding: 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      margin-bottom: 30px;
      position: relative;
    }
    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
    }
    .nav-link {
      padding: 12px 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      transition: all 0.3s;
    }
    .nav-link:hover, .nav-link.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transform: translateY(-2px);
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .upload-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
      align-items: flex-end;
    }
    .upload-field {
      flex: 1;
      min-width: 200px;
    }
    .upload-field label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #a8b2d1;
    }
    .upload-field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
    }
    .btn-primary {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      color: #1a1a2e;
      cursor: pointer;
      transition: 0.2s;
      margin-left: 10px;
    }
    .btn-secondary {
      background: #4facfe;
      border: none;
      padding: 12px 24px;
      border-radius: 28px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    .status {
      background: rgba(0,0,0,0.3);
      padding: 14px 18px;
      border-radius: 20px;
      margin: 16px 0;
      font-weight: 500;
      color: #38ef7d;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stat-label {
      font-size: 0.8rem;
      color: #a8b2d1;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      color: #38ef7d;
    }
    .charts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin: 24px 0;
    }
    .chart-card {
      flex: 1;
      min-width: 280px;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chart-title {
      font-weight: 800;
      color: #667eea;
      margin-bottom: 12px;
      text-align: center;
    }
    .chart-wrap {
      height: 280px;
      position: relative;
    }
    .driver-table {
      overflow-x: auto;
      margin-top: 28px;
    }
    .driver-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .driver-table th, .driver-table td {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 8px;
      text-align: center;
    }
    .driver-table th {
      background: rgba(102,126,234,0.3);
      color: white;
    }
    .toast-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 3000;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-weight: 600;
      animation: slideIn 0.3s ease;
    }
    .toast-success { background: #11998e; }
    .toast-error { background: #eb3349; }
    @keyframes slideIn {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .loading.active { display: flex; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <div class="header">
      <h1>⚖️ تقارير الميزان الشهرية</h1>
      <p>تحليل ملفات Excel الخاصة بالوزن اليومي وعرض إحصائيات السائقين والمواد</p>
      <div id="logout-btn-container" style="position: absolute; top: 20px; left: 20px;"></div>
    </div>
    <div class="nav-links" id="navLinks"></div>

    <div class="card">
      <div class="upload-row">
        <div class="upload-field">
          <label>📂 اختر ملف Excel</label>
          <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xls">
        </div>
        <div class="upload-field">
          <label>📄 اسم الملف الناتج</label>
          <input type="text" id="outputName" value="Monthly_Report.xlsx">
        </div>
        <div>
          <button class="btn-primary" id="showResultsBtn">📊 عرض النتائج</button>
          <button class="btn-secondary" id="exportExcelBtn">📥 تصدير الاكسيل</button>
        </div>
      </div>

      <div id="statusMsg" class="status">✅ انتظار رفع ملف Excel...</div>

      <div id="metricsGrid" class="stats-grid" style="display:none;"></div>

      <div id="chartsArea" style="display:none;">
        <div class="charts-row">
          <div class="chart-card">
            <div class="chart-title">📦 إجمالي الأوزان حسب نوع البحص</div>
            <div class="chart-wrap"><canvas id="materialChart"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-title">🏆 أعلى 10 سائقين بعدد الرحلات</div>
            <div class="chart-wrap"><canvas id="topDriversChart"></canvas></div>
          </div>
        </div>
        <div class="driver-table">
          <div class="chart-title">🚛 إجمالي رحلات الشهر لكل سائق (رحلاتنا فقط)</div>
          <table id="driverTable">
            <thead><tr><th>اسم السائق</th><th>عدد الرحلات</th><th>مجموع الوزن (كجم)</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // -------------------- الثوابت --------------------
    const VALID_TRUCK_NUMBERS = new Set([
      "1091","2757","2758","2759","2760","2762","2818","2927","2928","2929",
      "3321","3322","3324","3325","3326","3461","3462","3963","4445","5324",
      "5367","5520","5521","5522","5523","5524","5525","5526","5527","5528",
      "5658","5796","5797","5800","6398","6428","6429","6430","6432","6612",
      "6613","6614","6615","6616","6617","6618","6619","6620","6621","6622",
      "6623","6624","6626","6629","6935","6939","7042","7043","7332","7682",
      "7750","7837","7926","7927","7928","7929","7930","7974","7980","9103",
      "9492","9493","9495","9496"
    ]);

    const EXCLUDED_NAMES = new Set([
      "eisam خ","eisam ح","عادل خ","عادل ح","mamoon","zeshan","برهان","ابراهيم"
    ]);

    function mapMaterialCode(code) {
      const mapping = { "46089": "3/8", "46085": "3/4", "46097": "3/16" };
      return mapping[code] || code;
    }

    let materialChart = null, topDriversChart = null;
    let currentResult = null; // تخزين النتيجة لعرضها وتصديرها

    function normalizeText(v){ return String(v??"").trim().normalize("NFKC").replace(/\s+/g," ").toLowerCase(); }
    function keepDigitsOnly(v){
      const ad = {"٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9"};
      let t = String(v??"").replace(/[٠-٩]/g, d=>ad[d]);
      let m = t.match(/\d+/g);
      return m ? m.join("") : "";
    }
    function hasExcludedName(row){ return row.some(c=>EXCLUDED_NAMES.has(normalizeText(c))); }

    function processData(rows){
      const headers = rows[0] || [];
      let matched=0, notMatched=0, total=0;
      const driverStats = new Map();
      const materialStats = new Map();

      for(let i=1;i<rows.length;i++){
        let row = (rows[i]||[]).slice();
        if(!row.some(v=>v!==null&&v!==undefined&&v!=="")) continue;
        total++;
        let cleanedTruck = keepDigitsOnly(row[4]??"");
        if(hasExcludedName(row)){ notMatched++; continue; }
        if(VALID_TRUCK_NUMBERS.has(cleanedTruck)){
          matched++;
          let driver = String(row[3]??"").trim();
          let weight = parseFloat(row[11]) || 0;
          let rawCode = String(row[5]??"").trim();
          let materialName = mapMaterialCode(rawCode);
          if(driver){
            if(!driverStats.has(driver)) driverStats.set(driver,{trips:0,weight:0});
            let d = driverStats.get(driver);
            d.trips++; d.weight+=weight;
          }
          if(materialName){
            materialStats.set(materialName, (materialStats.get(materialName)||0) + weight);
          }
        } else { notMatched++; }
      }
      const driversArr = Array.from(driverStats.entries()).map(([n,d])=>({name:n, trips:d.trips, totalWeight:d.weight}));
      driversArr.sort((a,b)=>b.trips-a.trips);
      const materialsArr = Array.from(materialStats.entries()).map(([name, w])=>({name, weight:w}));
      materialsArr.sort((a,b)=>b.weight-a.weight);
      const totalWeight = materialsArr.reduce((s,m)=>s+m.weight,0);
      return { matchedCount:matched, notMatchedCount:notMatched, totalRows:total,
               driversStats:driversArr, top10Drivers:driversArr.slice(0,10), materialsStats:materialsArr, totalWeightAll:totalWeight };
    }

    function displayUI(res){
      document.getElementById("metricsGrid").style.display="grid";
      document.getElementById("metricsGrid").innerHTML = `
        <div class="stat-card"><div class="stat-label">إجمالي الصفوف</div><div class="stat-value">${res.totalRows}</div></div>
        <div class="stat-card"><div class="stat-label">رحلاتنا (المحققة)</div><div class="stat-value">${res.matchedCount}</div></div>
        <div class="stat-card"><div class="stat-label">رحلات غير تابعة</div><div class="stat-value">${res.notMatchedCount}</div></div>
        <div class="stat-card"><div class="stat-label">نسبة الإنجاز</div><div class="stat-value">${res.totalRows?((res.matchedCount/res.totalRows)*100).toFixed(2):0}%</div></div>
        <div class="stat-card"><div class="stat-label">عدد السائقين المميزين</div><div class="stat-value">${res.driversStats.length}</div></div>
        <div class="stat-card"><div class="stat-label">إجمالي الوزن (طن)</div><div class="stat-value">${(res.totalWeightAll/1000).toFixed(1)} طن</div></div>
      `;
      const tbody = document.querySelector("#driverTable tbody");
      tbody.innerHTML = "";
      for(let d of res.driversStats){
        let tr = tbody.insertRow();
        tr.insertCell(0).textContent = d.name;
        tr.insertCell(1).textContent = d.trips;
        tr.insertCell(2).textContent = d.totalWeight.toLocaleString();
      }
      const topMats = res.materialsStats.slice(0,10);
      if(materialChart) materialChart.destroy();
      const ctxMat = document.getElementById("materialChart").getContext("2d");
      materialChart = new Chart(ctxMat, { type:"bar", data:{ labels:topMats.map(m=>m.name), datasets:[{ label:"الوزن الإجمالي (طن)", data:topMats.map(m=>m.weight/1000), backgroundColor:"#38ef7d", borderRadius:8 }] }, options:{ responsive:true, maintainAspectRatio:false } });
      if(topDriversChart) topDriversChart.destroy();
      const ctxDrv = document.getElementById("topDriversChart").getContext("2d");
      topDriversChart = new Chart(ctxDrv, { type:"bar", data:{ labels:res.top10Drivers.map(d=>d.name), datasets:[{ label:"عدد الرحلات", data:res.top10Drivers.map(d=>d.trips), backgroundColor:"#4facfe", borderRadius:8 }] }, options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y' } });
      document.getElementById("chartsArea").style.display = "block";
    }

    async function processExcelFile(file){
      let buf = await file.arrayBuffer();
      let wb = new ExcelJS.Workbook();
      await wb.xlsx.load(buf);
      let sheet = wb.worksheets[0];
      let rows = [];
      sheet.eachRow({includeEmpty:true}, (row)=>{ let vals = row.values.slice(1).map(v=>v??""); rows.push(vals); });
      return processData(rows);
    }

    // وظيفة تصدير Excel (صفحة واحدة فقط مع رسوم بيانية)
    async function exportToExcel(res, filename){
      const ExcelJS = window.ExcelJS;
      const workbook = new ExcelJS.Workbook();
      const ws = workbook.addWorksheet("Trips Dashboard", { views: [{ rightToLeft: true }] });

      // إعداد الأعمدة
      ws.columns = [
        { width: 28 }, { width: 18 }, { width: 18 }, { width: 18 },
        { width: 28 }, { width: 18 }, { width: 18 }, { width: 18 }
      ];

      // العنوان الرئيسي
      ws.mergeCells("A1:H1");
      ws.getCell("A1").value = "📊 التقرير الشهري - لوحة التحكم";
      ws.getCell("A1").font = { size: 16, bold: true, color: { argb: "FFFFFFFF" } };
      ws.getCell("A1").fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FF1F4E78" } };
      ws.getCell("A1").alignment = { horizontal: "center", vertical: "middle" };
      ws.getRow(1).height = 30;

      // ملخص المؤشرات
      ws.getCell("A3").value = "المؤشر";
      ws.getCell("B3").value = "القيمة";
      ws.getRow(3).font = { bold: true };
      ws.getRow(3).fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFD9EAF7" } };
      let rowIdx = 4;
      const metrics = [
        ["إجمالي الصفوف", res.totalRows],
        ["رحلاتنا (المحققة)", res.matchedCount],
        ["رحلات غير تابعة", res.notMatchedCount],
        ["نسبة الإنجاز", res.totalRows ? (res.matchedCount / res.totalRows) : 0],
        ["عدد السائقين", res.driversStats.length],
        ["إجمالي الوزن (كجم)", res.totalWeightAll],
        ["إجمالي الوزن (طن)", (res.totalWeightAll / 1000).toFixed(2)]
      ];
      metrics.forEach(([label, val]) => {
        ws.getCell(`A${rowIdx}`).value = label;
        ws.getCell(`B${rowIdx}`).value = val;
        if (label.includes("نسبة")) ws.getCell(`B${rowIdx}`).numFmt = "0.00%";
        rowIdx++;
      });

      // جدول السائقين
      rowIdx += 2;
      ws.getCell(`A${rowIdx}`).value = "إجمالي رحلات الشهر لكل سائق";
      ws.mergeCells(`A${rowIdx}:C${rowIdx}`);
      ws.getCell(`A${rowIdx}`).font = { bold: true, size: 12 };
      rowIdx++;
      ws.getCell(`A${rowIdx}`).value = "اسم السائق";
      ws.getCell(`B${rowIdx}`).value = "عدد الرحلات";
      ws.getCell(`C${rowIdx}`).value = "مجموع الوزن (كجم)";
      ws.getRow(rowIdx).font = { bold: true };
      ws.getRow(rowIdx).fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFD9EAF7" } };
      rowIdx++;
      for (let d of res.driversStats) {
        ws.getCell(`A${rowIdx}`).value = d.name;
        ws.getCell(`B${rowIdx}`).value = d.trips;
        ws.getCell(`C${rowIdx}`).value = d.totalWeight;
        rowIdx++;
      }

      // جدول المواد
      rowIdx += 2;
      ws.getCell(`A${rowIdx}`).value = "إجمالي الأوزان حسب نوع البحص";
      ws.mergeCells(`A${rowIdx}:B${rowIdx}`);
      ws.getCell(`A${rowIdx}`).font = { bold: true, size: 12 };
      rowIdx++;
      ws.getCell(`A${rowIdx}`).value = "نوع البحص";
      ws.getCell(`B${rowIdx}`).value = "الوزن الإجمالي (كجم)";
      ws.getRow(rowIdx).font = { bold: true };
      ws.getRow(rowIdx).fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFD9EAF7" } };
      rowIdx++;
      for (let m of res.materialsStats) {
        ws.getCell(`A${rowIdx}`).value = m.name;
        ws.getCell(`B${rowIdx}`).value = m.weight;
        rowIdx++;
      }

      // إضافة رسوم بيانية (باستخدام ExcelJS Chart API)
      // الرسم البياني للأوزان حسب المواد
      const materialDataStartRow = rowIdx - res.materialsStats.length;
      const materialDataEndRow = rowIdx - 1;
      if (res.materialsStats.length > 0) {
        ws.addChart(ExcelJS.ChartType.Bar, {
          name: "Chart_Materials",
          title: "إجمالي الأوزان حسب نوع البحص (طن)",
          xAxis: { label: "نوع البحص" },
          yAxis: { label: "الوزن (طن)" },
          data: {
            labels: `A${materialDataStartRow+1}:A${materialDataEndRow+1}`,
            datasets: [{ data: `B${materialDataStartRow+1}:B${materialDataEndRow+1}`, label: "الوزن (طن)" }]
          },
          position: { x: 500, y: 200 }
        });
      }

      // الرسم البياني لأعلى 10 سائقين
      const topDrivers = res.top10Drivers;
      const driversStartRow = rowIdx - res.driversStats.length;
      const driversEndRow = rowIdx - 1;
      if (topDrivers.length > 0) {
        ws.addChart(ExcelJS.ChartType.Bar, {
          name: "Chart_Drivers",
          title: "أعلى 10 سائقين بعدد الرحلات",
          xAxis: { label: "السائق" },
          yAxis: { label: "عدد الرحلات" },
          data: {
            labels: `A${driversStartRow+1}:A${driversStartRow+topDrivers.length}`,
            datasets: [{ data: `B${driversStartRow+1}:B${driversStartRow+topDrivers.length}`, label: "عدد الرحلات" }]
          },
          position: { x: 500, y: 500 }
        });
      }

      // حفظ الملف
      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename.endsWith(".xlsx") ? filename : filename + ".xlsx";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ربط الأزرار
    document.getElementById("showResultsBtn").onclick = async () => {
      const fileInput = document.getElementById("fileInput");
      if (!fileInput.files.length) {
        document.getElementById("statusMsg").innerHTML = "⚠️ يرجى اختيار ملف Excel أولاً.";
        return;
      }
      document.getElementById("statusMsg").innerHTML = "⏳ جاري المعالجة...";
      try {
        const result = await processExcelFile(fileInput.files[0]);
        currentResult = result;
        displayUI(result);
        document.getElementById("statusMsg").innerHTML = "✅ تمت المعالجة وعرض النتائج. يمكنك الآن تصدير التقرير.";
      } catch (e) {
        console.error(e);
        document.getElementById("statusMsg").innerHTML = "❌ خطأ: " + e.message;
      }
    };

    document.getElementById("exportExcelBtn").onclick = async () => {
      if (!currentResult) {
        document.getElementById("statusMsg").innerHTML = "⚠️ يرجى عرض النتائج أولاً (اضغط على 'عرض النتائج').";
        return;
      }
      const outName = document.getElementById("outputName").value.trim() || "Monthly_Report.xlsx";
      try {
        await exportToExcel(currentResult, outName);
        document.getElementById("statusMsg").innerHTML = "✅ تم تصدير التقرير بنجاح.";
      } catch (e) {
        console.error(e);
        document.getElementById("statusMsg").innerHTML = "❌ خطأ في التصدير: " + e.message;
      }
    };

    function showToast(msg, type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    function showLoading(show) {
      document.getElementById('loading').classList.toggle('active', show);
    }
  </script>
  <script src="navbar.js"></script>
</body>
</html>
