<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير - نظام إدارة طلبات كسارة الحبردي</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); color:#fff; }
        .container { max-width:1400px; margin:0 auto; padding:20px; }
        .header { text-align:center; padding:30px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); border-radius:20px; margin-bottom:30px; position:relative; }
        .nav-links { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:30px; }
        .nav-link { padding:12px 24px; background:rgba(255,255,255,0.1); border-radius:12px; text-decoration:none; color:#fff; font-weight:600; }
        .nav-link:hover,.nav-link.active { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); transform:translateY(-2px); }
        .report-filters { background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-bottom:25px; display:flex; flex-wrap:wrap; gap:15px; align-items:flex-end; }
        .filter-group { display:flex; flex-direction:column; gap:5px; }
        .filter-group label { font-size:0.85em; color:#a8b2d1; }
        .filter-group select,.filter-group input { padding:10px 15px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background-color:#1e1e3a; color:#fff; }
        .btn { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:600; display:inline-flex; align-items:center; gap:8px; }
        .btn-primary { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:#fff; }
        .btn-success { background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%); color:#fff; }
        .btn-info { background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%); color:#fff; }
        .summary-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px; margin-bottom:25px; }
        .summary-card { background:linear-gradient(135deg,rgba(102,126,234,0.3),rgba(118,75,162,0.3)); border-radius:12px; padding:20px; text-align:center; }
        .summary-card .value { font-size:2em; font-weight:700; color:#38ef7d; }
        .reports-list { background:rgba(255,255,255,0.05); border-radius:15px; padding:20px; margin-bottom:25px; overflow-x:auto; }
        .reports-list table { width:100%; border-collapse:collapse; }
        .reports-list th, .reports-list td { padding:12px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); }
        .reports-list th { background:rgba(102,126,234,0.3); }
        .report-detail { background:rgba(255,255,255,0.05); border-radius:15px; padding:20px; margin-top:25px; display:none; }
        .report-detail h3 { color:#667eea; margin-bottom:15px; }
        .detail-stats { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px; }
        .detail-stat { background:rgba(0,0,0,0.3); border-radius:12px; padding:15px; flex:1; min-width:120px; text-align:center; }
        .detail-stat .number { font-size:1.8em; color:#38ef7d; }
        .detail-table { overflow-x:auto; margin-top:15px; }
        .detail-table table { width:100%; border-collapse:collapse; }
        .detail-table th, .detail-table td { padding:8px; border-bottom:1px solid rgba(255,255,255,0.1); }
        .toast-container { position:fixed; top:20px; left:20px; z-index:3000; }
        .toast { padding:12px 20px; border-radius:8px; margin-bottom:10px; font-weight:600; animation:slideIn 0.3s ease; }
        .toast-success { background:#11998e; }
        .toast-error { background:#eb3349; }
        .loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display:flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media (max-width:768px){ .filter-group { width:100%; } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header">
            <h1>📊 التقارير المحفوظة</h1>
            <p>عرض وتحليل التقارير المرفوعة من ملفات Excel</p>
            <div id="logout-btn-container" style="position: absolute; top: 20px; left: 20px;"><button onclick="logout()" style="background: linear-gradient(135deg, #f5576c, #eb3349); border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;">🚪 تسجيل الخروج</button></div>
        </div>
        <div class="nav-links" id="navLinks"></div>

        <div class="report-filters">
            <div class="filter-group"><label>📅 من تاريخ</label><input type="date" id="filterStartDate"></div>
            <div class="filter-group"><label>📅 إلى تاريخ</label><input type="date" id="filterEndDate"></div>
            <div class="filter-group"><label>🔍 اسم التقرير</label><input type="text" id="filterFilename" placeholder="بحث..."></div>
            <div class="filter-group"><button class="btn btn-primary" onclick="loadReports()">🔍 بحث</button></div>
            <div class="filter-group"><button class="btn btn-info" onclick="exportReportsToExcel()">📥 تصدير القائمة</button></div>
        </div>

        <div class="reports-list">
            <h3>📋 قائمة التقارير</h3>
            <table id="reportsTable">
                <thead><tr><th>#</th><th>تاريخ التقرير</th><th>اسم التقرير</th><th>إجمالي الصفوف</th><th>رحلات محققة</th><th>نسبة الإنجاز</th><th>تاريخ الرفع</th><th>إجراءات</th></tr></thead>
                <tbody id="reportsBody"><tr><td colspan="8" style="text-align:center;">جاري التحميل...<\/td><\/tr></tbody>
            </table>
        </div>

        <div id="reportDetail" class="report-detail">
            <h3>📄 تفاصيل التقرير <span id="detailTitle"></span></h3>
            <div class="detail-stats" id="detailStats"></div>
            <div style="margin-bottom:10px;"><button class="btn btn-success" onclick="exportDetailToExcel()">📥 تصدير التفاصيل إلى Excel</button></div>
            <div class="detail-table" id="detailTable"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentReports = [];
        let currentDetailData = null;

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
            if (data) options.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if (res.status === 401) { window.location.href = '/login.html'; throw new Error('غير مصرح'); }
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadReports() {
            showLoading(true);
            try {
                const startDate = document.getElementById('filterStartDate').value;
                const endDate = document.getElementById('filterEndDate').value;
                const filename = document.getElementById('filterFilename').value;
                let url = `/reports-list?`;
                if (startDate) url += `startDate=${startDate}&`;
                if (endDate) url += `endDate=${endDate}&`;
                if (filename) url += `filename=${encodeURIComponent(filename)}&`;
                const reports = await apiCall(url);
                currentReports = reports;
                renderReportsTable(reports);
            } catch (err) {
                showToast('خطأ في تحميل التقارير', 'error');
            }
            showLoading(false);
        }

        function renderReportsTable(reports) {
            const tbody = document.getElementById('reportsBody');
            if (!reports.length) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا توجد تقارير<\/td><\/tr>';
                return;
            }
            tbody.innerHTML = reports.map((r, idx) => `
                <tr>
                    <td>${idx+1}</td>
                    <td>${new Date(r.report_date).toLocaleDateString('ar-SA')}</td>
                    <td>${escapeHtml(r.filename)}</td>
                    <td>${r.total_rows}</td>
                    <td>${r.matched_count}</td>
                    <td>${(r.achievement_rate * 100).toFixed(2)}%</td>
                    <td>${new Date(r.created_at).toLocaleString('ar-SA')}</td>
                    <td><button class="btn btn-info btn-sm" onclick="showReportDetail(${r.id})">📊 عرض التفاصيل</button></td>
                </tr>
            `).join('');
        }

        async function showReportDetail(id) {
            showLoading(true);
            try {
                const report = await apiCall(`/reports/${id}`);
                currentDetailData = report;
                document.getElementById('detailTitle').innerText = `: ${report.filename}`;
                const statsHtml = `
                    <div class="detail-stat"><div class="number">${report.total_rows}</div><div>إجمالي الصفوف</div></div>
                    <div class="detail-stat"><div class="number">${report.matched_count}</div><div>رحلات محققة</div></div>
                    <div class="detail-stat"><div class="number">${report.not_matched_count}</div><div>غير تابعة</div></div>
                    <div class="detail-stat"><div class="number">${(report.achievement_rate * 100).toFixed(2)}%</div><div>نسبة الإنجاز</div></div>
                `;
                document.getElementById('detailStats').innerHTML = statsHtml;
                
                let detailsHtml = '<h4>📋 الرحلات المحققة (عينة)</h4><table><thead><tr>';
                if (report.details && report.details.summaryRows && report.details.summaryRows.length) {
                    const headers = report.details.summaryRows[0];
                    headers.forEach(h => detailsHtml += `<th>${escapeHtml(h)}</th>`);
                    detailsHtml += `</tr></thead><tbody>`;
                    report.details.summaryRows.slice(1, 101).forEach(row => {
                        detailsHtml += `<tr>${row.map(cell => `<td>${escapeHtml(String(cell))}</td>`).join('')}</tr>`;
                    });
                    detailsHtml += `</tbody></table>`;
                    if (report.details.summaryRows.length > 100) detailsHtml += `<p>... و ${report.details.summaryRows.length - 100} صف إضافي</p>`;
                } else {
                    detailsHtml += '<p>لا توجد تفاصيل إضافية</p>';
                }
                document.getElementById('detailTable').innerHTML = detailsHtml;
                document.getElementById('reportDetail').style.display = 'block';
            } catch (err) {
                showToast('خطأ في تحميل تفاصيل التقرير', 'error');
            }
            showLoading(false);
        }

        async function exportDetailToExcel() {
            if (!currentDetailData) return;
            try {
                const ExcelJS = window.ExcelJS;
                const workbook = new ExcelJS.Workbook();
                const ws = workbook.addWorksheet('تفاصيل التقرير');
                if (currentDetailData.details && currentDetailData.details.summaryRows) {
                    currentDetailData.details.summaryRows.forEach(row => ws.addRow(row));
                }
                ws.columns = [{ width: 20 }, { width: 20 }, { width: 20 }, { width: 20 }, { width: 20 }, { width: 20 }];
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                saveAs(blob, `تقرير_${currentDetailData.filename}.xlsx`);
                showToast('✅ تم التصدير', 'success');
            } catch (err) {
                showToast('خطأ في التصدير', 'error');
            }
        }

        async function exportReportsToExcel() {
            if (!currentReports.length) { showToast('لا توجد تقارير للتصدير', 'error'); return; }
            const wsData = currentReports.map(r => ({
                'تاريخ التقرير': new Date(r.report_date).toLocaleDateString('ar-SA'),
                'اسم التقرير': r.filename,
                'إجمالي الصفوف': r.total_rows,
                'رحلات محققة': r.matched_count,
                'غير تابعة': r.not_matched_count,
                'نسبة الإنجاز': (r.achievement_rate * 100).toFixed(2) + '%',
                'تاريخ الرفع': new Date(r.created_at).toLocaleString('ar-SA')
            }));
            const ws = XLSX.utils.json_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'التقارير');
            XLSX.writeFile(wb, `التقارير_${new Date().toISOString().slice(0,19)}.xlsx`);
            showToast('✅ تم التصدير', 'success');
        }

        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function showToast(msg,type){ const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className=`toast toast-${type}`; t.innerText=msg; c.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function showLoading(show){ document.getElementById('loading').classList.toggle('active', show); }
        function logout(){ if(confirm('تسجيل الخروج؟')) fetch('/api/logout',{method:'POST',credentials:'include'}).then(()=>window.location.href='/login.html'); }
        function loadNav() {
            fetch('/api/me',{credentials:'include'}).then(r=>r.json()).then(data=>{
                if(data.user) {
                    document.getElementById('navLinks').innerHTML = `
                        <a href="index.html" class="nav-link">📊 الرئيسية</a>
                        <a href="orders.html" class="nav-link">📝 الطلبات</a>
                        <a href="distribution.html" class="nav-link">🚚 التوزيع</a>
                        <a href="trucks.html" class="nav-link">🚛 السيارات</a>
                        <a href="products.html" class="nav-link">📦 أنواع البحص</a>
                        <a href="factories.html" class="nav-link">🏭 المصانع</a>
                        <a href="reports.html" class="nav-link active">📊 التقارير</a>
                        <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
                        <a href="upload-report.html" class="nav-link">📤 رفع تقرير</a>
                        <a href="restrictions.html" class="nav-link">⛔ الحظر</a>
                        <a href="users.html" class="nav-link">👥 المستخدمين</a>
                        <a href="logs.html" class="nav-link">📜 السجلات</a>
                    `;
                } else window.location.href='/login.html';
            }).catch(()=>window.location.href='/login.html');
        }

        document.addEventListener('DOMContentLoaded', () => { loadNav(); loadReports(); });
    </script>
</body>
</html>
