<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - نظام إدارة طلبات البحص</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:linear-gradient(135deg,#1a1a2e,#16213e); color:#fff; }
        .container { max-width:1200px; margin:0 auto; padding:20px; }
        .header { text-align:center; padding:30px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:20px; margin-bottom:30px; position:relative; }
        .nav-links { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:30px; }
        .nav-link { padding:12px 24px; background:rgba(255,255,255,0.1); border-radius:12px; text-decoration:none; color:#fff; font-weight:600; }
        .nav-link:hover,.nav-link.active { background:linear-gradient(135deg,#667eea,#764ba2); }
        .btn { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:600; margin:5px; }
        .btn-success { background:#11998e; color:#fff; }
        .btn-danger { background:#eb3349; color:#fff; }
        .btn-warning { background:#f093fb; color:#fff; }
        .btn-info { background:#4facfe; color:#fff; }
        .card { background:rgba(255,255,255,0.05); border-radius:15px; padding:20px; margin-bottom:25px; }
        .card h3 { margin-bottom:15px; color:#667eea; }
        .form-group { margin-bottom:15px; display:flex; flex-direction:column; gap:5px; }
        .form-group label { font-weight:600; color:#a8b2d1; }
        .form-group input, .form-group select { padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        th, td { padding:10px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); }
        th { background:rgba(102,126,234,0.3); }
        .actions { display:flex; gap:8px; justify-content:center; }
        .toast-container { position:fixed; top:20px; left:20px; z-index:3000; }
        .toast { padding:12px 20px; border-radius:8px; margin-bottom:10px; font-weight:600; }
        .toast-success { background:#11998e; }
        .toast-error { background:#eb3349; }
        .toast-info { background:#4facfe; }
        .loading { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:2000; }
        .loading.active { display:flex; }
        .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header"><h1>⚙️ الإعدادات العامة</h1>
            <div style="position:absolute; top:20px; left:20px;"><button onclick="logout()" style="background:linear-gradient(135deg,#f5576c,#eb3349); border:none; padding:8px 20px; border-radius:25px; color:white; font-weight:bold; cursor:pointer;">🚪 تسجيل الخروج</button></div>
        </div>
        <div class="nav-links" id="navLinks"></div>

        <!-- إدارة المصانع -->
        <div class="card">
            <h3>🏭 المصانع</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                <input type="text" id="newFactoryName" placeholder="اسم المصنع" style="flex:2; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff;">
                <select id="newFactoryLocation" style="flex:1; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff;">
                    <option value="الرياض">الرياض</option>
                    <option value="الدمام">الدمام</option>
                    <option value="جدة">جدة</option>
                    <option value="أخرى">أخرى</option>
                </select>
                <button class="btn btn-success" onclick="addFactory()">➕ إضافة</button>
            </div>
            <table id="factoriesTable">
                <thead><tr><th>#</th><th>اسم المصنع</th><th>الموقع</th><th>إجراءات</th></tr></thead>
                <tbody id="factoriesBody"></tbody>
            </table>
        </div>

        <!-- إدارة أنواع البحص -->
        <div class="card">
            <h3>📦 أنواع البحص</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="newMaterial" placeholder="مثال: 3/4" style="flex:3; padding:10px;">
                <button class="btn btn-success" onclick="addMaterial()">➕ إضافة</button>
            </div>
            <table id="materialsTable">
                <thead><tr><th>#</th><th>نوع البحص</th><th>إجراءات</th></tr></thead>
                <tbody id="materialsBody"></tbody>
            </table>
        </div>

        <!-- إدارة السيارات -->
        <div class="card">
            <h3>🚛 السيارات والسائقين</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                <input type="text" id="newTruckNumber" placeholder="رقم السيارة" style="flex:1;">
                <input type="text" id="newTruckDriver" placeholder="اسم السائق" style="flex:2;">
                <button class="btn btn-success" onclick="addTruck()">➕ إضافة</button>
            </div>
            <table id="trucksTable">
                <thead><tr><th>#</th><th>رقم السيارة</th><th>السائق</th><th>إجراءات</th></tr></thead>
                <tbody id="trucksBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let factories = [], materials = [], trucks = [];

        async function apiCall(endpoint, method='GET', data=null) {
            const opts = { method, headers:{'Content-Type':'application/json'}, credentials:'include' };
            if(data && (method==='POST'||method==='PUT')) opts.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, opts);
            if(res.status === 401) { window.location.href='/login.html'; throw new Error('غير مصرح'); }
            if(!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadSettings() {
            showLoading(true);
            try {
                const data = await apiCall('/settings');
                factories = data.factories || [];
                materials = data.materials || [];
                trucks = data.trucks || [];
                renderTables();
            } catch(e) { showToast('خطأ في تحميل الإعدادات','error'); }
            showLoading(false);
        }

        function renderTables() {
            // المصانع
            const fBody = document.getElementById('factoriesBody');
            if(!factories.length) fBody.innerHTML = '<tr><td colspan="4">لا توجد مصانع</td></tr>';
            else {
                fBody.innerHTML = factories.map((f, idx) => `
                    <tr>
                        <td>${idx+1}</td>
                        <td>${escapeHtml(f.name)}</td>
                        <td>${escapeHtml(f.location || 'الرياض')}</td>
                        <td class="actions">
                            <button class="btn btn-warning btn-sm" onclick="editFactory(${idx})">✏️</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteFactory(${idx})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            }

            // المواد
            const mBody = document.getElementById('materialsBody');
            if(!materials.length) mBody.innerHTML = '<tr><td colspan="3">لا توجد أنواع بحص</td></tr>';
            else {
                mBody.innerHTML = materials.map((m, idx) => `
                    <tr>
                        <td>${idx+1}</td>
                        <td>${escapeHtml(m)}</td>
                        <td class="actions"><button class="btn btn-danger btn-sm" onclick="deleteMaterial(${idx})">🗑️</button></td>
                    </tr>
                `).join('');
            }

            // السيارات
            const tBody = document.getElementById('trucksBody');
            if(!trucks.length) tBody.innerHTML = '<tr><td colspan="4">لا توجد سيارات</td></tr>';
            else {
                tBody.innerHTML = trucks.map((t, idx) => `
                    <tr>
                        <td>${idx+1}</td>
                        <td>${escapeHtml(t.number)}</td>
                        <td>${escapeHtml(t.driver)}</td>
                        <td class="actions">
                            <button class="btn btn-warning btn-sm" onclick="editTruck(${idx})">✏️</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteTruck(${idx})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        // المصانع
        async function addFactory() {
            const name = document.getElementById('newFactoryName').value.trim();
            const location = document.getElementById('newFactoryLocation').value;
            if(!name) { showToast('أدخل اسم المصنع','error'); return; }
            factories.push({ name, location });
            await saveSettings();
            document.getElementById('newFactoryName').value = '';
            renderTables();
            showToast('✅ تم إضافة المصنع','success');
        }
        function editFactory(idx) {
            const newName = prompt('اسم المصنع الجديد:', factories[idx].name);
            if(newName && newName.trim()) {
                const newLoc = prompt('الموقع (الرياض/الدمام/جدة/أخرى):', factories[idx].location || 'الرياض');
                factories[idx] = { name: newName.trim(), location: newLoc?.trim() || 'الرياض' };
                saveSettings();
                renderTables();
                showToast('تم التعديل','success');
            }
        }
        async function deleteFactory(idx) {
            if(confirm(`حذف المصنع "${factories[idx].name}"؟`)) {
                factories.splice(idx,1);
                await saveSettings();
                renderTables();
                showToast('تم الحذف','info');
            }
        }

        // المواد
        async function addMaterial() {
            const mat = document.getElementById('newMaterial').value.trim();
            if(!mat) { showToast('أدخل نوع البحص','error'); return; }
            materials.push(mat);
            await saveSettings();
            document.getElementById('newMaterial').value = '';
            renderTables();
            showToast('✅ تم إضافة النوع','success');
        }
        async function deleteMaterial(idx) {
            if(confirm(`حذف نوع البحص "${materials[idx]}"؟`)) {
                materials.splice(idx,1);
                await saveSettings();
                renderTables();
                showToast('تم الحذف','info');
            }
        }

        // السيارات
        async function addTruck() {
            const number = document.getElementById('newTruckNumber').value.trim();
            const driver = document.getElementById('newTruckDriver').value.trim();
            if(!number || !driver) { showToast('املأ الرقم والسائق','error'); return; }
            trucks.push({ number, driver });
            await saveSettings();
            document.getElementById('newTruckNumber').value = '';
            document.getElementById('newTruckDriver').value = '';
            renderTables();
            showToast('✅ تم إضافة السيارة','success');
        }
        function editTruck(idx) {
            const newNumber = prompt('رقم السيارة الجديد:', trucks[idx].number);
            const newDriver = prompt('اسم السائق الجديد:', trucks[idx].driver);
            if(newNumber && newNumber.trim() && newDriver && newDriver.trim()) {
                trucks[idx] = { number: newNumber.trim(), driver: newDriver.trim() };
                saveSettings();
                renderTables();
                showToast('تم التعديل','success');
            }
        }
        async function deleteTruck(idx) {
            if(confirm(`حذف السيارة ${trucks[idx].number}؟`)) {
                trucks.splice(idx,1);
                await saveSettings();
                renderTables();
                showToast('تم الحذف','info');
            }
        }

        async function saveSettings() {
            try {
                await apiCall('/settings', 'PUT', { factories, materials, trucks });
            } catch(e) { showToast('خطأ في حفظ الإعدادات','error'); }
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function showToast(msg,type){ const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className=`toast toast-${type}`; t.innerText=msg; c.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function showLoading(s){ document.getElementById('loading').classList.toggle('active',s); }
        function logout(){ if(confirm('تسجيل الخروج؟')) fetch('/api/logout',{method:'POST',credentials:'include'}).then(()=>window.location.href='/login.html'); }
        function loadNav(){ fetch('/api/me',{credentials:'include'}).then(r=>r.json()).then(data=>{ if(data.user) document.getElementById('navLinks').innerHTML=`<a href="index.html" class="nav-link">📊 الرئيسية</a><a href="orders.html" class="nav-link">📝 الطلبات</a><a href="distribution.html" class="nav-link">🚚 التوزيع</a><a href="trucks.html" class="nav-link">🚛 السيارات</a><a href="products.html" class="nav-link">📦 أنواع البحص</a><a href="factories.html" class="nav-link">🏭 المصانع</a><a href="reports.html" class="nav-link">📊 التقارير</a><a href="settings.html" class="nav-link active">⚙️ الإعدادات</a><a href="restrictions.html" class="nav-link">⛔ الحظر</a><a href="users.html" class="nav-link">👥 المستخدمين</a><a href="logs.html" class="nav-link">📜 السجلات</a>`; else window.location.href='/login.html'; }).catch(()=>window.location.href='/login.html'); }
        document.addEventListener('DOMContentLoaded', () => { loadNav(); loadSettings(); });
    </script>
</body>
</html>
