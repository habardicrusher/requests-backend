<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القيود - نظام إدارة طلبات البحص</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚛 نظام إدارة طلبات البحص</h1>
            <p>قيود السائقين</p>
            <div class="user-info">
                <div class="user-badge">
                    <span>👤</span>
                    <span id="currentUsername">-</span>
                    <span class="chip" id="userRole">-</span>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-section">
            <div class="nav-links" id="mainNav"></div>
        </div>

        <!-- Content -->
        <div class="content-card">
            <h2>⛔ قيود السائقين</h2>
            <p style="color: #a8b2d1; margin-bottom: 20px;">تحديد السائقين الممنوعين من الذهاب لمصانع معينة</p>
            <button class="btn btn-success" onclick="openAddRestrictionModal()">➕ إضافة قيد جديد</button>
            <div id="restrictionsList" style="margin-top: 20px;"></div>
        </div>
    </div>

    <!-- Restriction Modal -->
    <div class="modal" id="restrictionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="restrictionModalTitle">⛔ إضافة قيد</h3>
                <button class="close-modal" onclick="closeModal('restrictionModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="restrictionEditId">
                <div class="form-group">
                    <label>🚛 اختر السيارة</label>
                    <select id="restrictionTruck" onchange="updateRestrictionDriver()"></select>
                </div>
                <div class="form-group">
                    <label>👤 السائق</label>
                    <input type="text" id="restrictionDriver" readonly style="background: rgba(255,255,255,0.02);">
                </div>
                <div class="form-group">
                    <label>🏭 المصانع الممنوعة</label>
                    <div id="factoriesCheckboxes" style="max-height: 200px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px;"></div>
                </div>
                <div class="form-group">
                    <label>📝 سبب المنع</label>
                    <textarea id="restrictionReason" rows="3" placeholder="اكتب سبب منع هذا السائق..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-danger" onclick="closeModal('restrictionModal')">❌ إلغاء</button>
                <button class="btn btn-sm btn-success" onclick="saveRestriction()">💾 حفظ</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/restrictions.js"></script>
</body>
</html>
