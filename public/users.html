<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستخدمين - نظام إدارة طلبات البحص</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚛 نظام إدارة طلبات البحص</h1>
            <p>إدارة المستخدمين</p>
            <div class="user-info">
                <div class="user-badge">
                    <span>👤</span>
                    <span id="currentUsername">-</span>
                    <span class="chip" id="userRole">-</span>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-section">
            <div class="nav-links" id="mainNav"></div>
        </div>

        <!-- Content -->
        <div class="content-card">
            <h2>👥 إدارة المستخدمين</h2>
            <button class="btn btn-success" onclick="openAddUserModal()">➕ إضافة مستخدم جديد</button>
            <div id="usersList" style="margin-top: 20px;"></div>
        </div>
    </div>

    <!-- User Modal -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="userModalTitle">➕ إضافة مستخدم</h3>
                <button class="close-modal" onclick="closeModal('userModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="userEditId">
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="newUsername" placeholder="اسم المستخدم">
                </div>
                <div class="form-group">
                    <label>🔐 كلمة المرور</label>
                    <input type="password" id="newPassword" placeholder="كلمة المرور">
                </div>
                <div class="form-group">
                    <label>📋 الدور</label>
                    <select id="newUserRole">
                        <option value="user">👤 مستخدم عادي</option>
                        <option value="admin">👑 مدير</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔑 الصلاحيات</label>
                    <div class="permissions-grid" id="permissionsCheckboxes"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-danger" onclick="closeModal('userModal')">❌ إلغاء</button>
                <button class="btn btn-sm btn-success" onclick="saveUser()">💾 حفظ</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
