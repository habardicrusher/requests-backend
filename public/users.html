<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستخدمين - نظام إدارة طلبات البحص</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <div class="header">
            <h1>🚛 نظام إدارة طلبات البحص</h1>
            <p>إدارة المستخدمين والصلاحيات</p>
            <div class="user-info">
                <div class="user-badge">
                    <span>👤</span>
                    <span id="currentUsername">-</span>
                    <span class="chip" id="userRole">-</span>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-links" id="mainNav">
                </div>
        </div>

        <div class="content-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>👥 إدارة المستخدمين</h2>
                <button class="btn btn-success" onclick="openAddUserModal()">
                    ➕ إضافة مستخدم جديد
                </button>
            </div>
            
            <div id="usersList">
                <p style="text-align:center; color:#a8b2d1;">جاري جلب البيانات...</p>
            </div>
        </div>
    </div>

    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="userModalTitle">➕ إضافة مستخدم جديد</h3>
                <button class="close-modal" onclick="closeModal('userModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="userEditId">
                
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="newUsername" placeholder="أدخل اسم المستخدم">
                </div>

                <div class="form-group">
                    <label>🔐 كلمة المرور</label>
                    <input type="password" id="newPassword" placeholder="اتركها فارغة عند التعديل إذا لم ترد تغييرها">
                </div>

                <div class="form-group">
                    <label>📋 الدور الوظيفي</label>
                    <select id="newUserRole">
                        <option value="user">👤 مستخدم عادي</option>
                        <option value="admin">👑 مدير نظام</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🔑 تحديد الصلاحيات</label>
                    <div class="permissions-grid" id="permissionsCheckboxes">
                        </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="closeModal('userModal')">❌ إلغاء</button>
                <button class="btn btn-success" onclick="saveUser()">💾 حفظ البيانات</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
