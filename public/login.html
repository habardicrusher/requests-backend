<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة طلبات البحص</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="login-container">
        <div class="login-box">
            <h2>🚛 نظام إدارة طلبات البحص</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
                </div>
                <div class="form-group">
                    <label>🔐 كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    🔓 تسجيل الدخول
                </button>
            </form>
        </div>
    </div>

    <!-- مهم: لازم api.js يتحمل قبل كود تسجيل الدخول لأنه فيه API_BASE -->
    <script src="js/api.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // بدل /api/login (كان بيروح لـ GitHub Pages ويطلع 405)
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json().catch(() => ({}));

                if (response.ok) {
                    // على GitHub Pages لازم بدون /
                    window.location.href = 'orders.html';
                } else {
                    showToast(data.error || 'خطأ في تسجيل الدخول', 'error');
                }
            } catch (error) {
                console.error(error);
                showToast('خطأ في الاتصال بالسيرفر', 'error');
            }
        });

        function showToast(msg, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
