<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التوزيع - نظام إدارة طلبات البحص</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚛 نظام إدارة طلبات البحص</h1>
            <p>التوزيع التلقائي</p>
            <div class="user-info">
                <div class="user-badge">
                    <span>👤</span>
                    <span id="currentUsername">-</span>
                    <span class="chip" id="userRole">-</span>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-section">
            <div class="nav-links" id="mainNav"></div>
        </div>

        <!-- Date Section -->
        <div class="date-section">
            <div>
                <label>📅 تاريخ العمل: </label>
                <input type="date" id="orderDate" onchange="loadDayDataAndRender()">
            </div>
            <div class="button-group" id="actionButtons">
                <button class="btn btn-success" onclick="autoDistribute()" id="btnDistribute">⚡ توزيع تلقائي</button>
                <button class="btn btn-danger" onclick="resetDistribution()" id="btnResetDist">🔄 إعادة التعيين</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalOrders">0</h3>
                <p>📋 إجمالي الطلبات</p>
            </div>
            <div class="stat-card">
                <h3 id="distributedCount">0</h3>
                <p>✅ تم توزيعها</p>
            </div>
            <div class="stat-card">
                <h3 id="road1Count">0</h3>
                <p>🔵 رود 1</p>
            </div>
            <div class="stat-card">
                <h3 id="road2Count">0</h3>
                <p>🔴 رود 2</p>
            </div>
        </div>

        <!-- Distribution Table -->
        <div class="content-card">
            <h2>🚚 جدول التوزيع</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>رقم السيارة</th>
                        <th>السائق</th>
                        <th>المصنع</th>
                        <th>نوع البحص</th>
                        <th>الرود</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="distributionTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/distribution.js"></script>
</body>
</html>
