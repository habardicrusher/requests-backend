<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير - نظام إدارة طلبات البحص</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚛 نظام إدارة طلبات البحص</h1>
            <p>التقارير والإحصائيات</p>
            <div class="user-info">
                <div class="user-badge">
                    <span>👤</span>
                    <span id="currentUsername">-</span>
                    <span class="chip" id="userRole">-</span>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-section">
            <div class="nav-links" id="mainNav"></div>
        </div>

        <!-- Filters -->
        <div class="report-filters">
            <div class="filter-group">
                <label>📅 نوع الفترة</label>
                <select id="reportPeriod" onchange="updateReportDates()">
                    <option value="day">يوم واحد</option>
                    <option value="week">أسبوع</option>
                    <option value="month" selected>شهر</option>
                    <option value="custom">فترة مخصصة</option>
                </select>
            </div>
            <div class="filter-group">
                <label>من تاريخ</label>
                <input type="date" id="reportStartDate">
            </div>
            <div class="filter-group">
                <label>إلى تاريخ</label>
                <input type="date" id="reportEndDate">
            </div>
            <div class="filter-group" style="align-self: flex-end;">
                <button class="btn btn-primary" onclick="generateReports()">📊 عرض التقرير</button>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-cards" id="reportSummary"></div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-container">
                <h3>📈 رحلات السائقين</h3>
                <div class="chart-wrapper"><canvas id="driversChart"></canvas></div>
            </div>
            <div class="chart-container">
                <h3>🏭 طلبات المصانع</h3>
                <div class="chart-wrapper"><canvas id="factoriesChart"></canvas></div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>📦 توزيع أنواع البحص</h3>
                <div class="chart-wrapper"><canvas id="materialsChart"></canvas></div>
            </div>
            <div class="chart-container">
                <h3>📅 الرحلات اليومية</h3>
                <div class="chart-wrapper"><canvas id="dailyChart"></canvas></div>
            </div>
        </div>

        <!-- Drivers Rank Table -->
        <div class="content-card print-section">
            <h2>🏆 ترتيب السائقين حسب عدد الرحلات</h2>
            <table id="driversRankTable">
                <thead>
                    <tr>
                        <th>الترتيب</th>
                        <th>رقم السيارة</th>
                        <th>السائق</th>
                        <th>عدد الرحلات</th>
                        <th>رود 1</th>
                        <th>رود 2</th>
                        <th>النسبة</th>
                    </tr>
                </thead>
                <tbody id="driversRankBody"></tbody>
            </table>
        </div>

        <!-- Export Buttons -->
        <div class="export-buttons" id="exportButtons">
            <button class="btn btn-success" onclick="exportReportToExcelWithCharts()">📊 تصدير Excel مع رسوم</button>
            <button class="btn btn-info" onclick="exportReportToExcel()">📥 تصدير Excel</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
