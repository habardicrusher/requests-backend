<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطلبات - نظام إدارة طلبات البحص</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>جاري التحميل...</p>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚛 نظام إدارة طلبات البحص</h1>
            <p>إدارة الطلبات والتوزيع</p>
            <div class="user-info">
                <div class="user-badge">
                    <span>👤</span>
                    <span id="currentUsername">-</span>
                    <span class="chip" id="userRole">-</span>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-section">
            <div class="nav-links" id="mainNav"></div>
        </div>

        <!-- Date Section -->
        <div class="date-section">
            <div>
                <label>📅 تاريخ العمل: </label>
                <input type="date" id="orderDate" onchange="loadDayDataAndRender()">
            </div>
            <div class="button-group">
                <button class="btn btn-info" onclick="exportToExcel()" id="btnExport">📥 تصدير Excel</button>
            </div>
        </div>

        <!-- Content -->
        <div class="content-card">
            <h2>➕ إضافة طلب جديد</h2>
            <div class="order-form" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px;">
                <div class="form-group">
                    <label>🏭 المصنع</label>
                    <select id="factorySelect"></select>
                </div>
                <div class="form-group">
                    <label>📦 نوع البحص</label>
                    <select id="materialType"></select>
                </div>
                <div class="form-group">
                    <label>🔢 العدد</label>
                    <input type="number" id="orderCount" min="1" value="1">
                </div>
            </div>
            <button class="btn btn-success" onclick="addOrder()" id="btnAddOrder">✅ إضافة الطلب</button>
            
            <div class="quick-add-section" id="quickAddSection">
                <h4>⚡ إضافة سريعة (اختر المصنع أولاً)</h4>
                <div class="quick-add-grid" id="quickAddButtons"></div>
            </div>
        </div>

        <div class="content-card">
            <h2>📋 طلبات اليوم (<span id="ordersCount">0</span> طلب)</h2>
            <div id="todayOrders"></div>
        </div>
    </div>

    <!-- Edit Order Modal -->
    <div class="modal" id="editOrderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ تعديل الطلب</h3>
                <button class="close-modal" onclick="closeModal('editOrderModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editOrderId">
                <div class="form-group">
                    <label>🏭 المصنع</label>
                    <select id="editOrderFactory"></select>
                </div>
                <div class="form-group">
                    <label>📦 نوع البحص</label>
                    <select id="editOrderMaterial"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-danger" onclick="closeModal('editOrderModal')">❌ إلغاء</button>
                <button class="btn btn-sm btn-success" onclick="saveOrderEdit()">💾 حفظ</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
